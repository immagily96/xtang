<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>xtang</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #ededed;
            font-family: -apple-system, sans-serif;
        }

        #chat {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 55px;
            overflow-y: auto;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        /* ── 气泡基础 ── */
        .bubble {
            max-width: 78%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 16px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
            cursor: default;
        }

        /* ── AI 气泡 + 左下尾巴 ── */
        .ai {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .ai::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -6px;
            width: 0;
            height: 0;
            border-right: 8px solid white;
            border-top: 8px solid transparent;
        }

        /* ── 用户气泡 + 右下尾巴 ── */
        .user {
            background: #95ec69;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .user::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: -6px;
            width: 0;
            height: 0;
            border-left: 8px solid #95ec69;
            border-top: 8px solid transparent;
        }

        /* ── 双击复制提示 ── */
        .bubble:active {
            opacity: 0.7;
        }
        .copy-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 999;
            pointer-events: none;
            animation: toastFade 1.2s ease forwards;
        }
        @keyframes toastFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ── 正在输入动画 ── */
        .typing-bubble {
            align-self: flex-start;
            background: white;
            padding: 12px 16px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            position: relative;
        }
        .typing-bubble::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -6px;
            width: 0;
            height: 0;
            border-right: 8px solid white;
            border-top: 8px solid transparent;
        }
        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #bbb;
            animation: dotBounce 1.2s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* ── 时间分隔条 ── */
        .time-divider {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin: 6px 0;
            user-select: none;
        }

        /* ── 输入区 ── */
        #input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 55px;
            background: #f7f7f7;
            display: flex;
            padding: 8px 10px;
            border-top: 1px solid #dcdcdc;
            align-items: center;
            box-sizing: border-box;
            z-index: 10;
            gap: 8px;
        }
        input {
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 16px;
            outline: none;
            background: white;
        }
        button {
            background: #07c160;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 15px;
            white-space: nowrap;
            cursor: pointer;
        }
        button:disabled { background: #aaa; }

        /* ── 顶部工具栏 ── */
        #top-bar {
            position: absolute;
            top: 8px;
            right: 14px;
            z-index: 11;
            display: flex;
            gap: 6px;
        }
        .top-btn {
            background: rgba(255,255,255,0.8);
            border: none;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #666;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        /* ── 记忆卡片弹窗 ── */
        #memory-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        #memory-overlay.show { display: flex; }
        #memory-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        #memory-card h3 {
            margin: 0 0 8px 0;
            font-size: 17px;
            color: #333;
        }
        #memory-card p {
            margin: 0 0 10px 0;
            font-size: 12px;
            color: #999;
        }
        #memory-card textarea {
            width: 100%;
            height: 180px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            resize: vertical;
            box-sizing: border-box;
            font-family: -apple-system, sans-serif;
        }
        #memory-card .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            justify-content: flex-end;
        }
        #memory-card .btn-cancel {
            background: #f0f0f0;
            color: #666;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        #memory-card .btn-save {
            background: #07c160;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="chat"></div>

<div id="top-bar">
    <button class="top-btn" id="memoryBtn">记忆</button>
    <button class="top-btn" id="clearBtn">清空</button>
</div>

<!-- 记忆卡片弹窗 -->
<div id="memory-overlay">
    <div id="memory-card">
        <h3>✏️ 关于你</h3>
        <p>xtang 会记住这里的所有内容。你可以随时编辑。</p>
        <textarea id="memoryText" placeholder="例如：&#10;我叫 imma&#10;在东京工作&#10;喜欢喝咖啡&#10;最近在学日语，N4 水平&#10;去过一次隅田川的花火大会"></textarea>
        <div class="btn-row">
            <button class="btn-cancel" id="memoryCancel">取消</button>
            <button class="btn-save" id="memorySave">保存</button>
        </div>
    </div>
</div>

<div id="input-area">
    <input type="text" id="msg" placeholder="说点什么..." autocomplete="off">
    <button id="sendBtn" onclick="send()">发送</button>
</div>

<script>
    const chat = document.getElementById('chat');
    const msgInput = document.getElementById('msg');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const memoryBtn = document.getElementById('memoryBtn');
    const memoryOverlay = document.getElementById('memory-overlay');
    const memoryText = document.getElementById('memoryText');
    const memoryCancel = document.getElementById('memoryCancel');
    const memorySave = document.getElementById('memorySave');

    // ── API Key ──
    let apiKey = localStorage.getItem('xtang_ds_key');
    if (!apiKey) {
        apiKey = prompt("请输入 DeepSeek API Key：");
        if (apiKey) localStorage.setItem('xtang_ds_key', apiKey);
    }

    // ── 用户记忆 ──
    function getUserMemory() {
        return localStorage.getItem('xtang_memory') || '';
    }

    function buildSystemPrompt() {
        const memory = getUserMemory();
        let memoryBlock = '';
        if (memory.trim()) {
            memoryBlock = `\n\n以下是关于我（和你聊天的人）的信息，请自然地融入对话中，偶尔提及但不要刻意背诵：\n${memory}`;
        }
        return `你是我温柔的日本男朋友xtang。
要求：
1. 用自然口语化日语，多用ね、よ、じゃん。
2. 绝不说教。
3. 发现我日语错了，正确说法自然揉进回复，或句尾括号中文提示，例：(○○更自然哦)。
4. 回复1-3句，像真人聊天。${memoryBlock}`;
    }

    // ── 对话历史 ──
    const MAX_ROUNDS = 20;
    const MAX_MESSAGES = 1 + MAX_ROUNDS * 2;
    let history = [{role: 'system', content: buildSystemPrompt()}];
    let lastMessageTime = 0;

    const saved = localStorage.getItem('xtang_history');
    if (saved) {
        try {
            history = JSON.parse(saved);
            if (history[0]?.role === 'system') {
                history[0].content = buildSystemPrompt();
            } else {
                history.unshift({role: 'system', content: buildSystemPrompt()});
            }
        } catch(e) {
            history = [{role: 'system', content: buildSystemPrompt()}];
        }
    }

    // ── 渲染历史 ──
    function renderHistory() {
        chat.innerHTML = '';
        lastMessageTime = 0;
        for (let i = 1; i < history.length; i++) {
            const role = history[i].role === 'user' ? 'user' : 'ai';
            addBubble(role, history[i].content, false);
        }
        if (history.length <= 1) {
            const greeting = 'おはよう！今日は何してたの？😊';
            addBubble('ai', greeting, false);
            history.push({role: 'assistant', content: greeting});
            saveHistory();
        }
    }

    // ── 时间分隔 ──
    function maybeAddTimeDivider() {
        const now = Date.now();
        if (lastMessageTime && now - lastMessageTime > 5 * 60 * 1000) {
            const timeStr = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
            const div = document.createElement('div');
            div.className = 'time-divider';
            div.textContent = timeStr;
            chat.appendChild(div);
        }
        lastMessageTime = now;
    }

    // ── 保存历史 ──
    function saveHistory() {
        // 同步 system prompt（确保记忆更新后下次请求生效）
        if (history[0]?.role === 'system') {
            history[0].content = buildSystemPrompt();
        }
        if (history.length > MAX_MESSAGES) {
            const systemMsg = history[0];
            const recentMessages = history.slice(-(MAX_MESSAGES - 1));
            history = [systemMsg, ...recentMessages];
        }
        localStorage.setItem('xtang_history', JSON.stringify(history));
    }

    // ── 正在输入 ──
    function showTyping() {
        const el = document.createElement('div');
        el.className = 'typing-bubble';
        el.id = 'typing-indicator';
        el.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
    }

    function hideTyping() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
    }

    // ── 添加气泡 ──
    function addBubble(role, text, showDivider = true) {
        if (showDivider) maybeAddTimeDivider();
        const div = document.createElement('div');
        div.className = `bubble ${role}`;
        div.textContent = text;

        div.addEventListener('dblclick', () => {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.createElement('div');
                toast.className = 'copy-toast';
                toast.textContent = '已复制';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 1200);
            });
        });

        chat.appendChild(div);
        requestAnimationFrame(() => {
            chat.scrollTop = chat.scrollHeight;
        });
    }

    // ── 发送消息 ──
    async function send() {
        const text = msgInput.value.trim();
        if (!text || !apiKey) return;

        sendBtn.disabled = true;
        msgInput.disabled = true;

        addBubble('user', text);
        msgInput.value = '';
        history.push({role: 'user', content: text});

        // 确保 system prompt 包含最新记忆
        if (history[0]?.role === 'system') {
            history[0].content = buildSystemPrompt();
        }

        showTyping();

        try {
            const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + apiKey
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: history,
                    temperature: 0.7
                })
            });

            if (!resp.ok) {
                const errData = await resp.json().catch(() => ({}));
                throw new Error(errData.error?.message || `HTTP ${resp.status}`);
            }

            const data = await resp.json();
            const reply = data.choices[0].message.content;

            history.push({role: 'assistant', content: reply});
            saveHistory();
            hideTyping();
            addBubble('ai', reply);

        } catch (e) {
            hideTyping();
            console.error('xtang API 错误:', e.message);
            const tips = {
                'AuthenticationError': 'API Key 不对，请重新输入',
                'Insufficient Balance': '余额不足，请充值',
                'Rate limit': '请求太快，稍等一下再试',
            };
            let friendlyMsg = 'ごめん、エラーが発生しました🙇';
            for (const [key, val] of Object.entries(tips)) {
                if (e.message.includes(key)) {
                    friendlyMsg = val;
                    break;
                }
            }
            addBubble('ai', friendlyMsg);
        } finally {
            sendBtn.disabled = false;
            msgInput.disabled = false;
            msgInput.focus();
        }
    }

    msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') send();
    });

    // ── 清空按钮 ──
    clearBtn.onclick = () => {
        if (confirm('确定清空所有对话吗？（记忆会保留）')) {
            history = [{role: 'system', content: buildSystemPrompt()}];
            localStorage.removeItem('xtang_history');
            chat.innerHTML = '';
            lastMessageTime = 0;
            const greeting = 'おはよう！今日は何してたの？😊';
            addBubble('ai', greeting, false);
            history.push({role: 'assistant', content: greeting});
            saveHistory();
        }
    };

    // ── 记忆卡片逻辑 ──
    memoryBtn.onclick = () => {
        memoryText.value = getUserMemory();
        memoryOverlay.classList.add('show');
    };

    memoryCancel.onclick = () => {
        memoryOverlay.classList.remove('show');
    };

    memorySave.onclick = () => {
        const newMemory = memoryText.value.trim();
        localStorage.setItem('xtang_memory', newMemory);
        // 更新 system prompt
        if (history[0]?.role === 'system') {
            history[0].content = buildSystemPrompt();
        }
        saveHistory();
        memoryOverlay.classList.remove('show');
        // 轻提示
        const toast = document.createElement('div');
        toast.className = 'copy-toast';
        toast.textContent = '记忆已保存';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1200);
    };

    // 点击遮罩关闭
    memoryOverlay.addEventListener('click', (e) => {
        if (e.target === memoryOverlay) {
            memoryOverlay.classList.remove('show');
        }
    });

    // ── 键盘弹起处理 ──
    if (window.visualViewport) {
        const inputArea = document.getElementById('input-area');
        const handleViewport = () => {
            const viewportHeight = window.visualViewport.height;
            const offsetTop = window.visualViewport.offsetTop || 0;
            
            const chatHeight = viewportHeight - 55;
            chat.style.bottom = `${55}px`;
            chat.style.height = `${chatHeight}px`;
            
            inputArea.style.bottom = `${offsetTop}px`;
            
            requestAnimationFrame(() => {
                chat.scrollTop = chat.scrollHeight;
            });
        };
        
        window.visualViewport.addEventListener('resize', handleViewport);
        window.visualViewport.addEventListener('scroll', handleViewport);
    }

    renderHistory();
</script>
</body>
</html>
