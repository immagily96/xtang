<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Haru</title>
    <style>
        html, body {
            height: 100vh;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            background: #ededed;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .ai { background: white; align-self: flex-start; }
        .user { background: #95ec69; align-self: flex-end; }
        #input-area {
            flex-shrink: 0;
            background: #f7f7f7;
            display: flex;
            padding: 8px;
            border-top: 1px solid #dcdcdc;
            align-items: center;
        }
        input {
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 8px;
            font-size: 16px;
            outline: none;
            background: white;
        }
        button {
            background: #07c160;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            margin-left: 8px;
            font-size: 15px;
        }
        button:disabled { background: #aaa; }
    </style>
</head>
<body>

<div id="chat"></div>

<div id="input-area">
    <input type="text" id="msg" placeholder="说点什么..." autocomplete="off">
    <button id="sendBtn" onclick="send()">发送</button>
</div>

<script>
    const chat = document.getElementById('chat');
    const msgInput = document.getElementById('msg');
    const sendBtn = document.getElementById('sendBtn');

    // ── API Key ──
    let apiKey = localStorage.getItem('haru_ds_key');
    if (!apiKey) {
        apiKey = prompt("请输入 DeepSeek API Key：");
        if (apiKey) localStorage.setItem('haru_ds_key', apiKey);
    }

    // ── 系统提示词 ──
    const systemPrompt = `你是我温柔的日本男朋友Haru。
要求：
1. 用自然口语化日语，多用ね、よ、じゃん。
2. 绝不说教。
3. 发现我日语错了，正确说法自然揉进回复，或句尾括号中文提示，例：(○○更自然哦)。
4. 回复1-3句，像真人聊天。`;

    // ── 对话历史 ──
    const MAX_ROUNDS = 10;  // 最多保留10轮对话（user + assistant 各算一轮）
    const MAX_MESSAGES = 1 + MAX_ROUNDS * 2;  // system + 对话
    let history = [{role: 'system', content: systemPrompt}];

    const saved = localStorage.getItem('haru_history');
    if (saved) {
        try {
            history = JSON.parse(saved);
            // 确保 system prompt 永远在第一位且是最新版本
            if (history[0]?.role === 'system') {
                history[0].content = systemPrompt;
            } else {
                history.unshift({role: 'system', content: systemPrompt});
            }
        } catch(e) {
            history = [{role: 'system', content: systemPrompt}];
        }
    }

    // ── 渲染历史 ──
    function renderHistory() {
        chat.innerHTML = '';
        for (let i = 1; i < history.length; i++) {
            const role = history[i].role === 'user' ? 'user' : 'ai';
            addBubble(role, history[i].content);
        }
        if (history.length <= 1) {
            const greeting = 'おはよう！今日は何してたの？😊';
            addBubble('ai', greeting);
            history.push({role: 'assistant', content: greeting});
            saveHistory();
        }
    }

    // ── 裁剪并保存 ──
    function saveHistory() {
        if (history.length > MAX_MESSAGES) {
            const systemMsg = history[0];
            const recentMessages = history.slice(-(MAX_MESSAGES - 1));
            history = [systemMsg, ...recentMessages];
        }
        localStorage.setItem('haru_history', JSON.stringify(history));
    }

    // ── 添加气泡 ──
    function addBubble(role, text) {
        const div = document.createElement('div');
        div.className = `bubble ${role}`;
        div.textContent = text;
        chat.appendChild(div);
        requestAnimationFrame(() => {
            chat.scrollTop = chat.scrollHeight;
        });
    }

    // ── 发送消息 ──
    async function send() {
        const text = msgInput.value.trim();
        if (!text || !apiKey) return;

        sendBtn.disabled = true;
        msgInput.disabled = true;

        addBubble('user', text);
        msgInput.value = '';
        history.push({role: 'user', content: text});

        try {
            const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + apiKey
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: history,
                    temperature: 0.7
                })
            });

            // 处理非200响应
            if (!resp.ok) {
                const errData = await resp.json().catch(() => ({}));
                const errMsg = errData.error?.message || `HTTP ${resp.status}`;
                throw new Error(errMsg);
            }

            const data = await resp.json();
            const reply = data.choices[0].message.content;

            history.push({role: 'assistant', content: reply});
            saveHistory();
            addBubble('ai', reply);

        } catch (e) {
            // 给用户看友好提示，控制台留完整错误
            console.error('Haru API 错误:', e.message);
            const tips = {
                'AuthenticationError': 'API Key 不对，请重新输入',
                'Insufficient Balance': '余额不足，请充值',
                'Rate limit': '请求太快，稍等一下再试',
            };
            let friendlyMsg = 'ごめん、エラーが発生しました🙇';
            for (const [key, val] of Object.entries(tips)) {
                if (e.message.includes(key)) {
                    friendlyMsg = val;
                    break;
                }
            }
            addBubble('ai', friendlyMsg);
        } finally {
            sendBtn.disabled = false;
            msgInput.disabled = false;
            msgInput.focus();
        }
    }

    msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') send();
    });

    renderHistory();
</script>
</body>
</html>
