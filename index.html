<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOICE ARCHIVE</title>
    <style>
        :root { --bg-start: #f0f7f4; --bg-end: #fff5e6; --text: #374151; --accent: #8fb39e; }
        body { background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); color: var(--text); 
               font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
               margin: 0; display: flex; align-items: center; justify-content: center; 
               min-height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 100%; text-align: center; padding: 20px; }
        #visualizer { width: 180px; height: 180px; margin: 0 auto 60px; border-radius: 50%; 
                      background: var(--accent); opacity: 0.3; cursor: pointer; position: relative; }
        #visualizer.active { animation: wave 2s infinite ease-out; }
        @keyframes wave { 0% { box-shadow: 0 0 0 0 rgba(143, 179, 158, 0.7); } 100% { box-shadow: 0 0 0 50px rgba(143, 179, 158, 0); } }
        #status { font-size: 1.6rem; line-height: 1.6; margin-bottom: 40px; font-weight: 500; }
        .correction-box { margin-top: 30px; padding: 25px; background: rgba(255,255,255,0.4); 
                          border-radius: 15px; font-size: 1.2rem; font-style: italic; text-align: left; }
        #settings { display: none; margin-top: 40px; padding-top: 20px; text-align: left; }
        #settings.open { display: block; }
        input { background: rgba(255,255,255,0.6); border: 1px solid #ccc; padding: 15px; width: 100%; margin-bottom: 20px; border-radius: 8px; font-size: 1.1rem; }
    </style>
</head>
<body>
<div class="container">
    <div id="visualizer"></div>
    <div id="status">点击圆球开始练习</div>
    <div id="settings">
        <input type="password" id="dsKey" placeholder="DeepSeek API Key">
        <input type="password" id="elKey" placeholder="ElevenLabs API Key">
    </div>
</div>
<script>
    const statusDiv = document.getElementById('status'), visualizer = document.getElementById('visualizer');
    // 强化指令：不仅禁止复述，还要求强制进行日语引导教学
    const systemPrompt = `你现在是日语外教 xtang。严禁复述、模仿或确认用户刚才说的话。
    规则：1. 发现错误时，指出并纠正（中文，<15字）。2. 语法正确时，分享简短知识点（中文，<15字）。3. 必须进行日语追问引导。4. JSON：{"japanese": "日语回复", "correction": "中文提示" }。`;
    let history = [{role: 'system', content: systemPrompt}];
    
    visualizer.onclick = () => { 
        if(!localStorage.getItem('ds')) { document.getElementById('settings').classList.toggle('open'); return; }
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ja-JP'; rec.start(); visualizer.classList.add('active'); statusDiv.innerText = "Listening..."; 
        
        rec.onresult = async (e) => {
            statusDiv.innerText = "Thinking...";
            const userText = e.results[0][0].transcript;
            
            // 将用户输入加入历史，确保上下文连贯
            history.push({role: 'user', content: userText});
            
            const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('ds')},
                body: JSON.stringify({model: 'deepseek-chat', messages: history})
            });
            const data = await resp.json();
            const content = JSON.parse(data.choices[0].message.content.match(/\{[\s\S]*\}/)[0]);
            
            // 将 AI 回复加入历史
            history.push({role: 'assistant', content: JSON.stringify(content)});
            
            statusDiv.innerHTML = `${content.japanese}<div class="correction-box">💡 提示：<br>${content.correction}</div>`;
            playAudio(content.japanese);
        };
    };
    
    async function playAudio(text) {
        const resp = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/WpkOjWrdwRn56WUVBAVk`, {
            method: 'POST', headers: {'xi-api-key': localStorage.getItem('el'), 'Content-Type': 'application/json'},
            body: JSON.stringify({text: text, model_id: "eleven_multilingual_v2"})
        });
        const blob = await resp.blob();
        const audio = new Audio(URL.createObjectURL(blob));
        audio.play();
        audio.onended = () => visualizer.classList.remove('active');
    }
    
    document.addEventListener('keydown', (e) => { if(e.key === 'k') document.getElementById('settings').classList.toggle('open'); });
    document.querySelectorAll('input').forEach(i => i.onblur = () => localStorage.setItem(i.id === 'dsKey' ? 'ds' : 'el', i.value));
</script>
</body>
</html>
