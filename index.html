<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xtang · 极简模式</title>
    <style>
        :root { --bg: #f0f4f8; --card: #ffffff; --accent: #7a9ead; --text: #4a4a4a; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .player { background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 90%; max-width: 400px; text-align: center; }
        #status { font-size: 1.1rem; margin-bottom: 20px; min-height: 1.5em; }
        #playBtn { width: 80px; height: 80px; background: var(--accent); border-radius: 50%; border: none; color: white; font-size: 20px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(122, 158, 173, 0.3); }
        #playBtn:active { transform: scale(0.95); }
        .tip { margin-top: 20px; padding: 15px; background: #f8fafc; border-left: 4px solid var(--accent); text-align: left; font-size: 0.9rem; color: #666; }
        #settings { margin-top: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="player">
        <div id="status">准备就绪</div>
        <button id="playBtn">▶</button>
        <div id="tipBox" class="tip" style="display:none;"></div>
        <div id="settings"><input type="password" id="dsKey" placeholder="DeepSeek Key" style="width:100px;"> <input type="password" id="elKey" placeholder="ElevenLabs Key" style="width:100px;"></div>
    </div>

<script>
    const statusDiv = document.getElementById('status'), btn = document.getElementById('playBtn'), tipBox = document.getElementById('tipBox');
    // 【省 Token 指令】
    const systemPrompt = `你只输出JSON: {"japanese": "回答(含追问)", "correction": "中文提示(10字内)"}. 不要有任何寒暄或多余解释。`;
    let history = [{role: 'system', content: systemPrompt}];

    btn.onclick = () => {
        if(!localStorage.getItem('ds')) { alert("请先输入Key"); return; }
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ja-JP'; rec.start(); btn.innerText = "●"; statusDiv.innerText = "监听中...";
        rec.onresult = async (e) => {
            statusDiv.innerText = "思考中...";
            history.push({role: 'user', content: e.results[0][0].transcript});
            const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('ds')},
                body: JSON.stringify({model: 'deepseek-chat', messages: history})
            });
            const data = await resp.json();
            const content = JSON.parse(data.choices[0].message.content.match(/\{[\s\S]*\}/)[0]);
            history.push({role: 'assistant', content: JSON.stringify(content)});
            statusDiv.innerText = content.japanese;
            tipBox.style.display = 'block'; tipBox.innerHTML = `💡 ${content.correction}`;
            playAudio(content.japanese);
        };
    };
    async function playAudio(text) {
        const resp = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/WpkOjWrdwRn56WUVBAVk`, {
            method: 'POST', headers: {'xi-api-key': localStorage.getItem('el'), 'Content-Type': 'application/json'},
            body: JSON.stringify({text: text, model_id: "eleven_multilingual_v2"})
        });
        const blob = await resp.blob();
        const audio = new Audio(URL.createObjectURL(blob));
        audio.play(); audio.onended = () => btn.innerText = "▶";
    }
    document.querySelectorAll('input').forEach(i => i.onblur = () => localStorage.setItem(i.id === 'dsKey' ? 'ds' : 'el', i.value));
</script>
</body>
</html>
