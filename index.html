<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xtang</title>
    <style>
        /* 强制隐藏浏览器外部滚动条，消除绿色横条 */
        ::-webkit-scrollbar { display: none; }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #e0e0e0;
            display: flex; justify-content: center; align-items: center;
        }

        /* 电脑版聊天容器 */
        #app-container {
            width: 100%; max-width: 900px; 
            height: 100vh;
            background: linear-gradient(180deg, #ffd1d1 0%, #ffe8e8 100%);
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden; /* 防止容器溢出 */
        }

        /* 顶部 Header */
        #header {
            padding: 10px 16px; 
            background: transparent;
            display: flex; flex-direction: column; gap: 8px; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        
        /* ===== 顶部头像 ===== */
        .avatar { 
            width: 40px; height: 40px; 
            background-image: url('boy.jpg');
            background-color: #ff4757; /* 加上底色占位 */
            background-size: cover; background-position: center;
            border-radius: 50%; 
            flex-shrink: 0;
        }
        .name { font-weight: 600; font-size: 16px; color: #333; }
        .sub-info { font-size: 12px; color: #888; }
        
        /* 工具栏 */
        .toolbar { display: flex; gap: 10px; font-size: 12px; color: #555; padding-bottom: 5px; }
        .toolbar span { cursor: pointer; padding: 2px 5px; outline: none; }

        /* ===== 聊天区域 ===== */
        #chat {
            flex: 1; overflow-y: auto; padding: 20px 14px;
            background: transparent;
            display: flex; flex-direction: column; gap: 6px; /* 保持6px紧贴距离 */
        }
        /* 自定义聊天框内部滚动条，保持美观 */
        #chat::-webkit-scrollbar { width: 6px; }
        #chat::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

        /* ===== 时间戳分隔线 ===== */
        .time-divider {
            text-align: center; font-size: 11px; color: #999; 
            margin: 10px 0; user-select: none;
            background: rgba(255,255,255,0.5); padding: 4px 12px; border-radius: 20px;
            display: inline-block; align-self: center;
        }

        /* ===== 紧密贴合的气泡排版 ===== */
        .msg-row { 
            display: flex; 
            width: 100%; 
            align-items: flex-end; 
            gap: 6px; 
        }
        .ai-row { justify-content: flex-start; padding-right: 20px; }
        .user-row { justify-content: flex-end; padding-left: 20px; flex-direction: row-reverse; }

        .bubble { 
            padding: 8px 14px; border-radius: 18px; 
            font-size: 15px; line-height: 1.5; 
            position: relative; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            max-width: 75%;
        }
        .ai { 
            background: rgba(255, 255, 255, 0.95); 
            color: #000; 
            border-bottom-left-radius: 4px;
        }
        .user { 
            background: #95ec69; 
            color: #000; 
            border-bottom-right-radius: 4px;
        }
        
        /* ===== 气泡旁情侣头像（强制占位） ===== */
        .bubble-avatar {
            width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
            background-size: cover; background-position: center;
            background-color: #ff4757; /* 即使是空图，也会显示红色圆形占位 */
        }
        .bubble-avatar.user-avatar { background-image: url('girl.jpg'); }
        .bubble-avatar.ai-avatar { background-image: url('boy.jpg'); }

        /* ===== 底部输入区 ===== */
        #input-area {
            height: 60px; 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.6);
            display: flex; align-items: center; padding: 0 15px; gap: 10px;
        }
        
        .input-wrapper {
            flex: 1; height: 40px; position: relative; display: flex; align-items: center; overflow: hidden;
            background: white; border-radius: 20px; border: 1px solid #e0e0e0;
            transition: all 0.2s; box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
            user-select: none;
        }
        .input-wrapper.voice-mode { background: #f0f0f0; border-color: #ccc; }
        .voice-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
            color: #333; font-size: 14px; font-weight: 600; letter-spacing: 1px; pointer-events: none; z-index: 5;
        }
        .input-wrapper.voice-mode .voice-overlay { display: flex; }
        
        input { 
            flex: 1; border: none; background: transparent; padding: 0 15px; 
            outline: none; font-size: 16px; color: #333; height: 100%; pointer-events: auto;
        }
        
        #sendBtn { 
            background: #07c160; color: white; border: none; padding: 8px 20px; 
            border-radius: 20px; font-weight: 500; cursor: pointer; height: 36px;
        }

        /* ===== Toast 动画 ===== */
        .copy-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75); color: white; padding: 8px 16px; border-radius: 20px;
            font-size: 13px; z-index: 999; pointer-events: none;
            animation: toastFade 1s ease forwards;
        }
        @keyframes toastFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="header">
        <div class="user-info">
            <div class="avatar"></div>
            <div>
                <div class="name">xtang</div>
                <div class="sub-info" id="headerStatus">在线</div>
            </div>
        </div>
        <div class="toolbar">
            <span id="btnMemory">记忆</span>
            <span id="btnPersona">人设</span>
            <span id="btnClear">清空</span>
        </div>
    </div>

    <div id="chat"></div>

    <div id="input-area">
        <div class="input-wrapper" id="inputWrapper">
            <div class="voice-overlay">按住 说话</div>
            <input type="text" id="msg" placeholder="说点什么..." autocomplete="off">
        </div>
        <button id="sendBtn">发送</button>
    </div>
</div>

<!-- 弹窗 -->
<div id="memory-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:16px;padding:20px;width:85%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
        <h3 style="margin:0 0 8px 0;font-size:17px;color:#333;">🧠 关于你</h3>
        <p style="margin:0 0 10px 0;font-size:12px;color:#999;">xtang 会记住这里的所有内容。</p>
        <textarea id="memoryText" style="width:100%;height:150px;border:1px solid #ddd;border-radius:10px;padding:10px;font-size:14px;line-height:1.6;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit;" placeholder="例如：我叫 imma，在东京工作，喜欢喝咖啡"></textarea>
        <div style="display:flex;gap:10px;margin-top:12px;justify-content:flex-end;">
            <button id="memoryCancel" style="background:#f0f0f0;color:#666;border:none;padding:8px 16px;border-radius:20px;font-size:14px;cursor:pointer;">取消</button>
            <button id="memorySave" style="background:#07c160;color:white;border:none;padding:8px 16px;border-radius:20px;font-size:14px;cursor:pointer;">保存</button>
        </div>
    </div>
</div>
<div id="persona-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:16px;padding:20px;width:85%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
        <h3 style="margin:0 0 8px 0;font-size:17px;color:#333;">🎭 xtang 的人设</h3>
        <p style="margin:0 0 10px 0;font-size:12px;color:#999;">编辑 xtang 的性格、说话风格和背景故事。</p>
        <textarea id="personaText" style="width:100%;height:150px;border:1px solid #ddd;border-radius:10px;padding:10px;font-size:14px;line-height:1.6;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit;" placeholder="例如：21岁的大学生，性格开朗温柔，喜欢叫我姐姐"></textarea>
        <div style="display:flex;gap:10px;margin-top:12px;justify-content:flex-end;">
            <button id="personaCancel" style="background:#f0f0f0;color:#666;border:none;padding:8px 16px;border-radius:20px;font-size:14px;cursor:pointer;">取消</button>
            <button id="personaSave" style="background:#07c160;color:white;border:none;padding:8px 16px;border-radius:20px;font-size:14px;cursor:pointer;">保存</button>
        </div>
    </div>
</div>

<script>
    const chat = document.getElementById('chat');
    const msgInput = document.getElementById('msg');
    const sendBtn = document.getElementById('sendBtn');
    const inputWrapper = document.getElementById('inputWrapper');
    const headerStatus = document.getElementById('headerStatus');
    let lastMessageTime = 0;

    let apiKey = localStorage.getItem('xtang_ds_key');
    if (!apiKey) { apiKey = prompt("请输入 DeepSeek API Key："); if (apiKey) localStorage.setItem('xtang_ds_key', apiKey); }

    const defaultPersona = `21岁的日本大学生，性格开朗温柔
【语言规则】纯日语口语为主！绝不能说中文长篇大论！
【称呼】非常喜欢叫对方"姐姐"（お姉ちゃん）
【铁律】说话必须极简，只能回一句话，最多20个字符！`;

    function getUserMemory() { return localStorage.getItem('xtang_memory') || ''; }
    function getUserPersona() { return localStorage.getItem('xtang_persona') || defaultPersona; }

    function buildSystemPrompt() {
        const persona = getUserPersona(); const memory = getUserMemory();
        let memoryBlock = memory.trim() ? `\n\n关于正在和你聊天的人：\n${memory}` : '';
        return `你是xtang，一个21岁的日本大学生。

【你的人设】
${persona}
${memoryBlock}

【🚨 绝对死命令！】
1. 回复只能用一句极短的日语口语！
2. 即使对方说中文，也必须用日语回答！
3. 绝对禁止长篇大论！禁止写中文长句！`;
    }

    let history = [{role: 'system', content: buildSystemPrompt()}];

    function renderHistory() {
        chat.innerHTML = ''; lastMessageTime = 0;
        for (let i = 1; i < history.length; i++) {
            const role = history[i].role === 'user' ? 'user' : 'assistant';
            addBubble(role, history[i].content, false);
        }
        if (history.length <= 1) {
            const greeting = 'おはよう😊 今日は何するの？';
            addBubble('assistant', greeting, false);
            history.push({role: 'assistant', content: greeting}); saveHistory();
        }
    }

    function saveHistory() {
        if (history[0]?.role === 'system') history[0].content = buildSystemPrompt();
        localStorage.setItem('xtang_history', JSON.stringify(history));
    }

    const saved = localStorage.getItem('xtang_history');
    if (saved) {
        try {
            history = JSON.parse(saved);
            if (history[0]?.role !== 'system') history.unshift({role: 'system', content: buildSystemPrompt()});
            else history[0].content = buildSystemPrompt();
        } catch(e) { history = [{role: 'system', content: buildSystemPrompt()}]; }
    }

    async function sendMessage(text, isAuto = false, specialPrompt = '') {
        if (!apiKey) return;
        addBubble('user', text);
        if (!isAuto) history.push({role: 'user', content: text});
        
        if (history[0]?.role === 'system') history[0].content = buildSystemPrompt();

        try {
            const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey},
                body: JSON.stringify({model: 'deepseek-chat', messages: history, temperature: 0.85})
            });
            const data = await resp.json();
            let reply = data.choices[0].message.content;
            
            const sentences = reply.match(/[^。！？.!?]+[。！？.!?]?/g);
            if (sentences && sentences.length > 0) reply = sentences[0].trim(); 
            if (reply.length > 20) reply = reply.substring(0, 18) + '…';

            history.push({role: 'assistant', content: reply});
            saveHistory();
            addBubble('assistant', reply);
        } catch (e) { console.error(e); }
    }

    function addBubble(role, text, showDivider = true) {
        if (showDivider) {
            const now = Date.now();
            if (lastMessageTime && now - lastMessageTime > 60 * 1000) { 
                const timeStr = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'});
                const div = document.createElement('div'); div.className = 'time-divider'; div.textContent = timeStr;
                chat.appendChild(div);
            }
            lastMessageTime = now;
        }

        const row = document.createElement('div');
        const isAI = role === 'assistant';
        row.className = `msg-row ${isAI ? 'ai-row' : 'user-row'}`;

        if (isAI) {
            row.innerHTML = `<div class="bubble-avatar ai-avatar"></div><div class="bubble ai">${text}</div>`;
        } else {
            row.innerHTML = `<div class="bubble user">${text}</div><div class="bubble-avatar user-avatar"></div>`;
        }
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
    }

    // ===== 长按语音交互 =====
    let isPressingVoice = false;
    let recognition = null;
    let longPressTimer = null;

    function handlePointerDown(e) {
        if (isPressingVoice) return;
        if (msgInput.value.trim().length > 0) return;

        longPressTimer = setTimeout(() => {
            startVoiceRecording(e);
        }, 300);
    }

    function handlePointerUp() {
        if (longPressTimer) {
            clearTimeout(longPressTimer);
            longPressTimer = null;
        }
        stopVoiceRecording();
    }

    function startVoiceRecording(e) {
        if (isPressingVoice) return;
        isPressingVoice = true;
        if (navigator.vibrate) navigator.vibrate(20);
        
        inputWrapper.classList.add('voice-mode');
        
        const toast = document.createElement('div'); toast.className = 'copy-toast'; 
        toast.textContent = '🎙️ 请说话...'; 
        document.body.appendChild(toast); setTimeout(() => toast.remove(), 1000);
        
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                if(transcript.trim()) { 
                    const toast2 = document.createElement('div'); toast2.className = 'copy-toast'; 
                    toast2.textContent = '发送中'; 
                    document.body.appendChild(toast2); setTimeout(() => toast2.remove(), 1000);
                    sendMessage(transcript); 
                }
            };
            recognition.onerror = () => { };
            recognition.onend = () => { 
                isPressingVoice = false; 
                inputWrapper.classList.remove('voice-mode');
            };
            recognition.start();
        } else {
            isPressingVoice = false; 
            inputWrapper.classList.remove('voice-mode');
        }
    }

    function stopVoiceRecording() {
        if (!isPressingVoice) return;
        isPressingVoice = false;
        inputWrapper.classList.remove('voice-mode');
        if (recognition) { try { recognition.stop(); recognition = null; } catch(e) {} }
    }

    inputWrapper.addEventListener('touchstart', handlePointerDown);
    inputWrapper.addEventListener('touchend', handlePointerUp);
    inputWrapper.addEventListener('touchcancel', handlePointerUp);
    inputWrapper.addEventListener('mousedown', handlePointerDown);
    inputWrapper.addEventListener('mouseup', handlePointerUp);
    inputWrapper.addEventListener('mouseleave', handlePointerUp);


    sendBtn.onclick = () => { if(msgInput.value.trim()) { sendMessage(msgInput.value); msgInput.value = ''; } };
    msgInput.onkeydown = (e) => { if(e.key === 'Enter') sendBtn.onclick(); };

    // ===== 设置菜单逻辑 =====
    document.getElementById('btnMemory').onclick = () => { document.getElementById('memoryText').value = getUserMemory(); document.getElementById('memory-overlay').style.display = 'flex'; };
    document.getElementById('memoryCancel').onclick = () => document.getElementById('memory-overlay').style.display = 'none';
    document.getElementById('memorySave').onclick = () => {
        localStorage.setItem('xtang_memory', document.getElementById('memoryText').value.trim());
        history[0].content = buildSystemPrompt(); document.getElementById('memory-overlay').style.display = 'none'; alert('记忆已保存 ✨');
    };

    document.getElementById('btnPersona').onclick = () => { document.getElementById('personaText').value = getUserPersona(); document.getElementById('persona-overlay').style.display = 'flex'; };
    document.getElementById('personaCancel').onclick = () => document.getElementById('persona-overlay').style.display = 'none';
    document.getElementById('personaSave').onclick = () => {
        localStorage.setItem('xtang_persona', document.getElementById('personaText').value.trim());
        history[0].content = buildSystemPrompt(); document.getElementById('persona-overlay').style.display = 'none'; alert('人设已保存 ✨');
    };

    document.getElementById('btnClear').onclick = () => {
        if (confirm('确定要清空所有聊天记录吗？')) {
            history = [{role: 'system', content: buildSystemPrompt()}];
            localStorage.setItem('xtang_history', JSON.stringify(history)); renderHistory();
        }
    };

    renderHistory();
</script>
</body>
</html>
