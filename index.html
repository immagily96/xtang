<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>xtang</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: -apple-system, sans-serif;
            background: linear-gradient(180deg, #ffd1d1 0%, #ffe8e8 100%);
        }

        body.theme-light { background: linear-gradient(180deg, #ffd1d1 0%, #ffe8e8 100%); }
        body.theme-dark { background: #2c2c2c; }
        body.theme-grid {
            background-color: #f5f5f5;
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        body.theme-warm { background: #fdf6f0; }

        #header {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            background: #f7f7f7; border-bottom: 1px solid #e5e5e5;
            display: flex; align-items: center; justify-content: center;
            padding: 0 16px; z-index: 11;
        }
        #settingsBtn {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.04); border: none;
            width: 32px; height: 32px; border-radius: 50%;
            font-size: 16px; color: #666;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.2s;
        }
        #settingsBtn:active { background: rgba(0, 0, 0, 0.1); }

        .header-center { display: flex; align-items: center; gap: 10px; }
        .header-avatar { width: 34px; height: 34px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
        .header-info { display: flex; flex-direction: column; justify-content: center; }
        .header-name { font-size: 16px; font-weight: 600; color: #111; line-height: 1.2; }
        .header-status { font-size: 10px; color: #888; line-height: 1.2; margin-top: 2px; display: flex; align-items: center; gap: 3px;}
        .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #f56262; }

        #dropdown-menu {
            display: none; position: fixed; top: 56px; right: 10px;
            background: white; border-radius: 12px; z-index: 20;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 4px 0; min-width: 120px;
        }
        #dropdown-menu.show { display: block; }
        #dropdown-menu .drop-item { padding: 10px 14px; font-size: 13px; color: #333; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        /* 优化聊天区域间距 */
        #chat {
            position: fixed; top: 56px; left: 0; right: 0; bottom: 56px;
            overflow-y: auto; padding: 20px 14px 40px 14px; 
            display: flex; flex-direction: column; gap: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .msg-row { display: flex; align-items: flex-end; gap: 8px; width: 100%; }
        .msg-row.ai-row { justify-content: flex-start; }
        .msg-row.user-row { justify-content: flex-end; flex-direction: row-reverse; }

        .bubble-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; background: #ddd; }

        .bubble {
            max-width: 70%; padding: 12px 16px; border-radius: 18px;
            font-size: 15px; line-height: 1.5; word-wrap: break-word; position: relative;
        }
        .ai { background: white; border-bottom-left-radius: 4px; color: #111; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .user { background: #95ec69; border-bottom-right-radius: 4px; color: #000; }
        .user .msg-status { position: absolute; bottom: 2px; right: -16px; font-size: 10px; color: #aaa; }

        #input-area {
            position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
            background: #f7f7f7; display: flex; padding: 6px 10px; border-top: 1px solid #dcdcdc;
            align-items: center; z-index: 10; gap: 8px;
        }
        #mainBtnWrapper { flex: 1; height: 38px; background: white; border-radius: 18px; border: 1px solid #e0e0e0; display: flex; align-items: center; }
        input { flex: 1; border: none; padding: 0 12px; font-size: 15px; outline: none; background: transparent; }
        #sendBtn { background: #07c160; color: white; border: none; padding: 0 14px; border-radius: 18px; font-size: 14px; height: 34px; cursor: pointer; }
    </style>
</head>
<body class="theme-light">

<div id="header">
    <div class="header-center">
        <div class="header-avatar"></div>
        <div class="header-info">
            <div class="header-name">xtang</div>
            <div class="header-status" id="headerStatus"><span class="status-dot"></span> 在线</div>
        </div>
    </div>
    <button id="settingsBtn">⚙️</button>
    <div id="dropdown-menu">
        <div class="drop-item" id="dropTheme">🎨 切换主题</div>
        <div class="drop-item" id="dropPersona">🎭 编辑人设</div>
        <div class="drop-item" id="dropMemory">🧠 编辑记忆</div>
        <div class="drop-item" id="dropClear">🗑️ 清空聊天</div>
    </div>
</div>

<div id="chat"></div>

<div id="input-area">
    <div id="mainBtnWrapper">
        <input type="text" id="msg" placeholder="说点什么..." autocomplete="off">
    </div>
    <button id="sendBtn">发送</button>
</div>

<script>
    const chat = document.getElementById('chat');
    const msgInput = document.getElementById('msg');
    const sendBtn = document.getElementById('sendBtn');
    
    // 强制日语的系统 prompt
    function buildSystemPrompt() {
        const persona = localStorage.getItem('xtang_persona') || `21岁的日本大学生，性格开朗温柔，母语是日语。`;
        const memory = localStorage.getItem('xtang_memory') || '';
        
        return `你是xtang。你的母语是日语。

【强制指令（严格遵守）】
1. 无论用户输入什么语言（包括中文），你必须“坚定地”只用日语回复！
2. 绝对禁止使用中文回复，禁止翻译。
3. 说话风格极度口语化，像真实的日本年轻人。
4. 回复只能是一句极短的日语口语！绝对不能长篇大论。
5. 结尾可以偶尔夹杂一个简单的中文词（如"姐姐"），但整句必须是日语。

【你的人设】
${persona}
${memory ? `\n【关于用户】\n${memory}` : ''}`;
    }

    let history = [{role: 'system', content: buildSystemPrompt()}];
    let apiKey = localStorage.getItem('xtang_ds_key');

    // 自动触发 apiKey 设置
    if (!apiKey) {
        apiKey = prompt("请输入 DeepSeek API Key：");
        if (apiKey) localStorage.setItem('xtang_ds_key', apiKey);
    }

    async function sendMessage(text) {
        if (!apiKey) return;
        addBubble('user', text);
        history.push({role: 'user', content: text});
        
        // 确保 prompt 是最新的
        history[0].content = buildSystemPrompt();

        try {
            const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey},
                body: JSON.stringify({model: 'deepseek-chat', messages: history, temperature: 0.85})
            });
            const data = await resp.json();
            const reply = data.choices[0].message.content;
            history.push({role: 'assistant', content: reply});
            addBubble('assistant', reply);
        } catch (e) {
            console.error(e);
        }
    }

    function addBubble(role, text) {
        const row = document.createElement('div');
        row.className = `msg-row ${role === 'assistant' ? 'ai-row' : 'user-row'}`;
        row.innerHTML = role === 'assistant' 
            ? `<div class="bubble-avatar"></div><div class="bubble ai">${text}</div>`
            : `<div class="bubble user">${text}</div><div class="bubble-avatar" style="background:#95ec69"></div>`;
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
    }

    sendBtn.onclick = () => {
        const text = msgInput.value.trim();
        if (text) {
            msgInput.value = '';
            sendMessage(text);
        }
    };

    document.getElementById('settingsBtn').onclick = () => document.getElementById('dropdown-menu').classList.toggle('show');
</script>
</body>
</html>
