<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>xtang</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, sans-serif;
            background: #ededed;
        }

        body.theme-light { background: #ededed; }
        body.theme-dark { background: #2c2c2c; }
        body.theme-grid {
            background-color: #f5f5f5;
            background-image:
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        body.theme-warm { background: #fdf6f0; }

        /* ===== 顶部栏重构 ===== */
        #header {
            position: fixed; top: 0; left: 0; right: 0; height: 54px;
            background: #f7f7f7; border-bottom: 1px solid #dcdcdc;
            display: flex; align-items: center; justify-content: center; /* 居中对齐 */
            padding: 0 16px; z-index: 11;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        
        /* 将原始功能按钮隐藏，移到一个可以通过双击调出的隐藏按钮中 */
        #settingsBtn {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: transparent; border: none; font-size: 18px; color: #888;
            padding: 5px; cursor: pointer;
        }

        /* 居中区域：头像 + 名字 + 状态 */
        .header-center {
            display: flex; align-items: center; gap: 10px;
        }
        /* 红色渐变头像框 */
        .header-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ff4757, #ff6348); 
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: white; flex-shrink: 0;
        }
        .header-info {
            display: flex; flex-direction: column; justify-content: center;
            text-align: left;
        }
        .header-name {
            font-size: 16px; font-weight: 600; color: #222; line-height: 1.2;
        }
        .header-status {
            font-size: 10px; color: #999; line-height: 1.2; margin-top: 1px;
        }

        /* ===== 下拉隐藏菜单 ===== */
        #dropdown-menu {
            display: none; position: fixed; top: 54px; right: 10px;
            background: white; border-radius: 12px; z-index: 20;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 4px 0; min-width: 130px;
        }
        #dropdown-menu.show { display: block; }
        #dropdown-menu .drop-item {
            padding: 10px 16px; font-size: 13px; color: #333; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }
        #dropdown-menu .drop-item:active { background: #f5f5f5; }

        /* ===== 聊天区 ===== */
        #chat {
            position: fixed; top: 54px; left: 0; right: 0; bottom: 56px;
            overflow-y: auto; padding: 10px 14px;
            display: flex; flex-direction: column; gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .bubble {
            max-width: 78%; padding: 8px 12px; border-radius: 16px;
            font-size: 14px; line-height: 1.35; word-wrap: break-word;
            position: relative; cursor: default;
        }
        .ai {
            background: white; align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        body.theme-dark .ai { background: #3a3a3a; color: #eee; }
        .ai::after {
            content: ''; position: absolute; bottom: 0; left: -6px;
            width: 0; height: 0;
            border-right: 7px solid white; border-top: 7px solid transparent;
        }
        body.theme-dark .ai::after { border-right-color: #3a3a3a; }

        .user {
            background: #95ec69; align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .user::after {
            content: ''; position: absolute; bottom: 0; right: -6px;
            width: 0; height: 0;
            border-left: 7px solid #95ec69; border-top: 7px solid transparent;
        }
        .user .msg-status {
            position: absolute; bottom: 3px; right: -16px;
            font-size: 10px; color: #aaa;
        }

        .bubble:active { opacity: 0.7; }
        .copy-toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7); color: white;
            padding: 6px 14px; border-radius: 16px; font-size: 12px;
            z-index: 999; pointer-events: none;
            animation: toastFade 1.2s ease forwards;
        }
        @keyframes toastFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        .typing-bubble {
            align-self: flex-start; background: white;
            padding: 10px 14px; border-radius: 16px;
            border-bottom-left-radius: 4px;
            display: flex; align-items: center; gap: 3px; position: relative;
        }
        body.theme-dark .typing-bubble { background: #3a3a3a; }
        .typing-bubble::after {
            content: ''; position: absolute; bottom: 0; left: -6px;
            width: 0; height: 0;
            border-right: 7px solid white; border-top: 7px solid transparent;
        }
        body.theme-dark .typing-bubble::after { border-right-color: #3a3a3a; }
        .typing-dot {
            width: 6px; height: 6px; border-radius: 50%; background: #bbb;
            animation: dotBounce 1.2s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .time-divider {
            text-align: center; font-size: 11px; color: #999;
            margin: 4px 0; user-select: none;
        }

        #context-menu {
            display: none; position: fixed; z-index: 200;
            background: white; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.18);
            padding: 6px 0; min-width: 120px;
        }
        #context-menu.show { display: block; }
        #context-menu .menu-item {
            padding: 10px 18px; font-size: 14px; color: #333;
            cursor: pointer; white-space: nowrap;
        }
        #context-menu .menu-item:active { background: #f5f5f5; }

        /* ===== 底部输入区 ===== */
        #input-area {
            position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
            background: #f7f7f7; display: flex; padding: 8px 10px;
            border-top: 1px solid #dcdcdc; align-items: center;
            z-index: 10; gap: 8px;
        }
        
        /* 输入框包裹层 (内含麦克风触发区) */
        .input-wrapper {
            flex: 1; height: 100%; position: relative; display: flex; align-items: center;
            background: white; border-radius: 20px; border: 1px solid #e0e0e0;
            transition: border-color 0.2s;
        }
        .input-wrapper:focus-within { border-color: #07c160; }
        
        /* 输入框左侧麦克风长按区域 */
        .mic-zone {
            height: 100%; width: 40px; display: flex; justify-content: center; align-items: center;
            color: #888; font-size: 18px; user-select: none; flex-shrink: 0;
            border-right: 1px solid #f0f0f0;
            touch-action: none; /* 防止触屏滚动 */
            cursor: pointer;
        }
        .mic-zone:active, .mic-zone.recording { color: #07c160; background: #f0fcf4; border-top-left-radius: 20px; border-bottom-left-radius: 20px; }

        input {
            flex: 1; border: none; border-radius: 20px;
            padding: 0 10px; font-size: 15px; outline: none; background: transparent;
            height: 100%;
        }
        
        button#sendBtn {
            background: #07c160; color: white; border: none;
            padding: 6px 16px; border-radius: 18px; font-size: 14px; font-weight: 500;
            white-space: nowrap; cursor: pointer; height: 34px;
        }
        button#sendBtn:disabled { background: #aaa; }

    </style>
</head>
<body class="theme-light">

<!-- 重构后的顶部 -->
<div id="header">
    <div class="header-center">
        <div class="header-avatar">🐶</div>
        <div class="header-info">
            <div class="header-name">xtang</div>
            <div class="header-status">21岁 · 大学生 · 在线 💚</div>
        </div>
    </div>
    <button id="settingsBtn">⚙️</button>

    <!-- 隐藏的设置小菜单 -->
    <div id="dropdown-menu">
        <div class="drop-item" id="dropTheme">🎨 切换主题</div>
        <div class="drop-item" id="dropPersona">🎭 编辑人设</div>
        <div class="drop-item" id="dropMemory">🧠 编辑记忆</div>
        <div class="drop-item" id="dropClear">🗑️ 清空聊天</div>
    </div>
</div>

<div id="chat"></div>

<div id="context-menu">
    <div class="menu-item" data-action="copy">📋 复制</div>
    <div class="menu-item" data-action="delete">🗑️ 删除</div>
</div>

<!-- 重构后的底部输入区 -->
<div id="input-area">
    <div class="input-wrapper" id="inputWrapper">
        <!-- 长按触发麦克风 -->
        <div class="mic-zone" id="micZone">🎤</div>
        <input type="text" id="msg" placeholder="说点什么..." autocomplete="off">
    </div>
    <button id="sendBtn">发送</button>
</div>

<div id="memory-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:16px;padding:20px;width:85%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
        <h3 style="margin:0 0 8px 0;font-size:17px;color:#333;">🧠 关于你</h3>
        <p style="margin:0 0 10px 0;font-size:12px;color:#999;">xtang 会记住这里的所有内容。</p>
        <textarea id="memoryText" style="width:100%;height:180px;border:1px solid #ddd;border-radius:10px;padding:10px;font-size:14px;line-height:1.6;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit;" placeholder="例如：&#10;我叫 imma&#10;在东京工作&#10;喜欢喝咖啡&#10;最近在学日语，N4 水平"></textarea>
        <div style="display:flex;gap:10px;margin-top:12px;justify-content:flex-end;">
            <button id="memoryCancel" style="background:#f0f0f0;color:#666;border:none;padding:8px 16px;border-radius:20px;font-size:14px;">取消</button>
            <button id="memorySave" style="background:#07c160;color:white;border:none;padding:8px 16px;border-radius:20px;font-size:14px;">保存</button>
        </div>
    </div>
</div>

<div id="persona-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:16px;padding:20px;width:85%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
        <h3 style="margin:0 0 8px 0;font-size:17px;color:#333;">🎭 xtang 的人设</h3>
        <p style="margin:0 0 10px 0;font-size:12px;color:#999;">编辑 xtang 的性格、说话风格和背景故事。</p>
        <textarea id="personaText" style="width:100%;height:180px;border:1px solid #ddd;border-radius:10px;padding:10px;font-size:14px;line-height:1.6;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit;" placeholder="例如：&#10;22岁的大学生，性格开朗温柔&#10;喜欢叫我姐姐&#10;有点天然呆但很真诚&#10;在东京读设计专业&#10;喜欢摄影和咖啡"></textarea>
        <div style="display:flex;gap:10px;margin-top:12px;justify-content:flex-end;">
            <button id="personaCancel" style="background:#f0f0f0;color:#666;border:none;padding:8px 16px;border-radius:20px;font-size:14px;">取消</button>
            <button id="personaSave" style="background:#07c160;color:white;border:none;padding:8px 16px;border-radius:20px;font-size:14px;">保存</button>
        </div>
    </div>
</div>

<script>
    const chat = document.getElementById('chat');
    const msgInput = document.getElementById('msg');
    const sendBtn = document.getElementById('sendBtn');
    const inputWrapper = document.getElementById('inputWrapper');
    const micZone = document.getElementById('micZone');
    const settingsBtn = document.getElementById('settingsBtn');
    const dropdown = document.getElementById('dropdown-menu');

    const contextMenu = document.getElementById('context-menu');

    const defaultPersona = `22岁的大学生，性格开朗温柔
喜欢叫对方"姐姐"
有点天然呆但很真诚
在东京读设计专业
喜欢摄影和咖啡
偶尔会撒娇，但该认真的时候很可靠
说话语气轻松活泼，带一点年轻人的慵懒感
正在自学中文，会一点点初级词汇，偶尔在句子末尾蹦出几个简单的中文词，比如"谢谢"、"好吃"、"厉害"、"好想你"、"好开心"之类的，显得很努力在学中文
聊天时喜欢用emoji和颜文字表达情绪，比如😊✨🥺💕(≧▽≦)(´；ω；｀)，让对话更生动`;

    const themes = ['theme-light', 'theme-dark', 'theme-grid', 'theme-warm'];
    let themeIdx = 0;
    const savedTheme = localStorage.getItem('xtang_theme');
    if (savedTheme && themes.includes(savedTheme)) { document.body.className = savedTheme; themeIdx = themes.indexOf(savedTheme); }

    let apiKey = localStorage.getItem('xtang_ds_key');
    if (!apiKey) { apiKey = prompt("请输入 DeepSeek API Key："); if (apiKey) localStorage.setItem('xtang_ds_key', apiKey); }

    function getUserMemory() { return localStorage.getItem('xtang_memory') || ''; }
    function getUserPersona() { return localStorage.getItem('xtang_persona') || defaultPersona; }

    function getCurrentTimeString() {
        const now = new Date();
        return now.toLocaleString('zh-CN', { weekday: 'long', hour: '2-digit', minute: '2-digit' });
    }

    function buildSystemPrompt() {
        const persona = getUserPersona();
        const memory = getUserMemory();
        const timeStr = getCurrentTimeString();
        let memoryBlock = memory.trim() ? `\n\n关于正在和你聊天的人（自然融入对话，不要刻意背诵）：\n${memory}` : '';
        return `你是xtang，以下是你的完整人设。请严格按照人设扮演，不要跳出角色。

【你的人设】
${persona}

【当前时间】
${timeStr}
（你可以根据时间调整语气，比如深夜说"早点休息ね"，早上说"おはよう"，但不要在每条消息里都提时间，自然就好）

【对话规则】
1. 日语口语为主，带ね、よ、じゃん。
2. 因为你在学中文，偶尔（大约每3-5句话）可以在句子末尾加一两个简单的中文词。不要整句说中文，只蹦一两个词。
3. 适当加emoji或颜文字让对话更生动自然。
4. 绝对不说教。
5. 纠错揉进回复，或括号中文小提示。
6. 【一次只能说一句话】每一条回复只能包含一句话。禁止两句话放一起。禁止长段落、展开解释。
7. 像LINE一样轻松简短。${memoryBlock}`;
    }

    const MAX_ROUNDS = 20;
    const MAX_MESSAGES = 1 + MAX_ROUNDS * 2;
    let history = [{role: 'system', content: buildSystemPrompt()}];
    let lastMessageTime = 0;

    const saved = localStorage.getItem('xtang_history');
    if (saved) {
        try {
            history = JSON.parse(saved);
            if (history[0]?.role !== 'system') history.unshift({role: 'system', content: buildSystemPrompt()});
            else history[0].content = buildSystemPrompt();
        } catch(e) { history = [{role: 'system', content: buildSystemPrompt()}]; }
    }

    function renderHistory() {
        chat.innerHTML = ''; lastMessageTime = 0;
        for (let i = 1; i < history.length; i++) {
            const role = history[i].role === 'user' ? 'user' : 'ai';
            addBubble(role, history[i].content, false);
        }
        if (history.length <= 1) {
            const greeting = 'おはよう！今日は何してたの？😊';
            addBubble('ai', greeting, false);
            history.push({role: 'assistant', content: greeting}); saveHistory();
        }
    }

    function maybeAddTimeDivider() {
        const now = Date.now();
        if (lastMessageTime && now - lastMessageTime > 5 * 60 * 1000) {
            const timeStr = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
            const div = document.createElement('div'); div.className = 'time-divider'; div.textContent = timeStr;
            chat.appendChild(div);
        }
        lastMessageTime = now;
    }

    function saveHistory() {
        if (history[0]?.role === 'system') history[0].content = buildSystemPrompt();
        if (history.length > MAX_MESSAGES) {
            const systemMsg = history[0];
            const recentMessages = history.slice(-(MAX_MESSAGES - 1));
            history = [systemMsg, ...recentMessages];
        }
        localStorage.setItem('xtang_history', JSON.stringify(history));
    }

    function showTyping() {
        hideTyping();
        const el = document.createElement('div'); el.className = 'typing-bubble'; el.id = 'typing-indicator';
        el.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
        chat.appendChild(el); chat.scrollTop = chat.scrollHeight;
    }
    function hideTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }

    function playTypingSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.type = 'triangle';
            o.frequency.setValueAtTime(800 + Math.random() * 400, ctx.currentTime);
            g.gain.setValueAtTime(0.03, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.03);
            o.connect(g); g.connect(ctx.destination);
            o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.03);
        } catch(e) {}
    }

    function playChime() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(1200, ctx.currentTime);
            o.frequency.setValueAtTime(1600, ctx.currentTime + 0.06);
            g.gain.setValueAtTime(0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            o.connect(g); g.connect(ctx.destination);
            o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.2);
        } catch(e) {}
    }

    function isNearBottom() {
        return chat.scrollHeight - chat.scrollTop - chat.clientHeight < 80;
    }

    function addBubble(role, text, showDivider = true) {
        if (showDivider) maybeAddTimeDivider();
        const div = document.createElement('div'); div.className = `bubble ${role}`; div.textContent = text;
        if (role === 'user') {
            const status = document.createElement('span'); status.className = 'msg-status';
            status.textContent = '✓'; div.appendChild(status); div._statusEl = status;
        }

        let longPressTimer;
        div.addEventListener('touchstart', (e) => {
            longPressTimer = setTimeout(() => {
                contextMenu._targetBubble = div;
                contextMenu._targetText = text;
                contextMenu.style.left = e.touches[0].clientX + 'px';
                contextMenu.style.top = e.touches[0].clientY + 'px';
                contextMenu.classList.add('show');
            }, 500);
        });
        div.addEventListener('touchend', () => clearTimeout(longPressTimer));
        div.addEventListener('touchmove', () => clearTimeout(longPressTimer));
        div.addEventListener('dblclick', () => {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.createElement('div'); toast.className = 'copy-toast';
                toast.textContent = '已复制'; document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 1200);
            });
        });

        chat.appendChild(div);
        const wasNearBottom = isNearBottom();
        requestAnimationFrame(() => { if (wasNearBottom) chat.scrollTop = chat.scrollHeight; });

        return div;
    }

    contextMenu.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
            const action = item.dataset.action;
            if (action === 'copy' && contextMenu._targetText) {
                navigator.clipboard.writeText(contextMenu._targetText).then(() => {
                    const toast = document.createElement('div'); toast.className = 'copy-toast';
                    toast.textContent = '已复制'; document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 1200);
                });
            } else if (action === 'delete' && contextMenu._targetBubble) {
                contextMenu._targetBubble.remove();
            }
            contextMenu.classList.remove('show');
        });
    });
    document.addEventListener('click', (e) => {
        if (!contextMenu.contains(e.target)) contextMenu.classList.remove('show');
    });

    async function sendMessage(text, isAuto = false, specialPrompt = '') {
        if (!apiKey) return;
        const userBubble = isAuto ? null : addBubble('user', text);
        if (!isAuto) {
            history.push({role: 'user', content: text});
        } else {
            history.push({role: 'system', content: specialPrompt});
        }
        if (history[0]?.role === 'system') history[0].content = buildSystemPrompt();
        showTyping();

        try {
            const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey},
                body: JSON.stringify({model: 'deepseek-chat', messages: history, temperature: 0.8})
            });
            if (!resp.ok) { const errData = await resp.json().catch(() => ({})); throw new Error(errData.error?.message || `HTTP ${resp.status}`); }
            const data = await resp.json();
            const reply = data.choices[0].message.content;
            const sentences = reply.split(/[。\n]+/).filter(s => s.trim());

            if (isAuto) {
                history.pop();
                history.push({role: 'assistant', content: reply});
            } else {
                history.push({role: 'assistant', content: reply});
            }
            saveHistory();

            const delay = isAuto ? 500 : 1500 + Math.random() * 1500;
            setTimeout(() => {
                hideTyping();
                if (userBubble && userBubble._statusEl) {
                    userBubble._statusEl.textContent = '✓✓'; userBubble._statusEl.style.color = '#07c160';
                }
                sentences.forEach((sentence, i) => {
                    setTimeout(() => {
                        playTypingSound();
                        addBubble('ai', sentence.trim());
                        if (i === sentences.length - 1 && !isAuto) playChime();
                    }, i * 700);
                });
            }, delay);
        } catch (e) {
            hideTyping();
            if (isAuto) history.pop();
            console.error('xtang API 错误:', e.message);
        }
    }

    async function send(prefillText) {
        const text = prefillText || msgInput.value.trim();
        if (!text || !apiKey) return;
        sendBtn.disabled = true; msgInput.disabled = true;
        if (!prefillText) msgInput.value = '';
        await sendMessage(text, false);
        sendBtn.disabled = false; msgInput.disabled = false; msgInput.focus();
    }

    function showToast(msg) {
        const toast = document.createElement('div'); toast.className = 'copy-toast';
        toast.textContent = msg; document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    // ===== 隐藏的设置菜单逻辑 =====
    settingsBtn.onclick = () => {
        dropdown.classList.toggle('show');
    };
    document.addEventListener('click', (e) => {
        if (!dropdown.contains(e.target) && e.target !== settingsBtn) {
            dropdown.classList.remove('show');
        }
    });

    document.getElementById('dropTheme').onclick = () => {
        themeIdx = (themeIdx + 1) % themes.length;
        document.body.className = themes[themeIdx];
        localStorage.setItem('xtang_theme', themes[themeIdx]);
        dropdown.classList.remove('show');
    };

    document.getElementById('dropPersona').onclick = () => {
        document.getElementById('personaText').value = getUserPersona();
        document.getElementById('persona-overlay').style.display = 'flex';
        dropdown.classList.remove('show');
    };
    document.getElementById('personaCancel').onclick = () => document.getElementById('persona-overlay').style.display = 'none';
    document.getElementById('personaSave').onclick = () => {
        localStorage.setItem('xtang_persona', document.getElementById('personaText').value.trim());
        history[0].content = buildSystemPrompt();
        document.getElementById('persona-overlay').style.display = 'none';
        showToast('人设已保存 ✨');
    };

    document.getElementById('dropMemory').onclick = () => {
        document.getElementById('memoryText').value = getUserMemory();
        document.getElementById('memory-overlay').style.display = 'flex';
        dropdown.classList.remove('show');
    };
    document.getElementById('memoryCancel').onclick = () => document.getElementById('memory-overlay').style.display = 'none';
    document.getElementById('memorySave').onclick = () => {
        localStorage.setItem('xtang_memory', document.getElementById('memoryText').value.trim());
        history[0].content = buildSystemPrompt();
        document.getElementById('memory-overlay').style.display = 'none';
        showToast('记忆已保存 ✨');
    };

    document.getElementById('dropClear').onclick = () => {
        if (confirm('确定要清空所有聊天记录吗？AI 会重新打招呼。')) {
            history = [{role: 'system', content: buildSystemPrompt()}];
            localStorage.setItem('xtang_history', JSON.stringify(history));
            renderHistory();
        }
        dropdown.classList.remove('show');
    };

    // ===== 消息发送逻辑 =====
    msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
    sendBtn.onclick = () => send();

    // ===== 核心：长按输入框左侧(🎤) 触发语音 =====
    let pressTimer = null;
    let isPressing = false;

    function startVoiceRecording(e) {
        if (isPressing) return;
        isPressing = true;

        // 启动震动反馈(如手机支持)
        if (navigator.vibrate) navigator.vibrate(30);

        micZone.classList.add('recording');
        showToast('🎙️ 按住说话...松开即发送');

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRecognition();
            rec.lang = 'ja-JP';
            rec.interimResults = false;
            rec.maxAlternatives = 1;

            rec.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                if(transcript.trim()) send(transcript);
            };
            rec.onerror = () => {
                showToast('语音识别失败，请手动输入');
                micZone.classList.remove('recording');
                isPressing = false;
            };
            rec.onend = () => {
                micZone.classList.remove('recording');
                isPressing = false;
            };
            rec.start();
            
            // 保存识别器，以便如果用户提前松手可以停止它
            micZone._rec = rec; 
        } else {
            showToast('你的浏览器不支持语音输入');
            micZone.classList.remove('recording');
            isPressing = false;
        }
    }

    function stopVoiceRecording() {
        if (!isPressing) return;
        isPressing = false;
        micZone.classList.remove('recording');
        
        if (micZone._rec) {
            try {
                micZone._rec.stop();
                micZone._rec = null;
            } catch(e) {}
        }
    }

    // 监听触摸事件(移动端)
    micZone.addEventListener('touchstart', (e) => {
        e.preventDefault(); // 避免触发键盘或者滚动
        startVoiceRecording(e);
    });
    micZone.addEventListener('touchend', (e) => {
        e.preventDefault();
        stopVoiceRecording();
    });
    micZone.addEventListener('touchcancel', (e) => {
        e.preventDefault();
        stopVoiceRecording();
    });

    // 监听鼠标事件(PC端测试用)
    micZone.addEventListener('mousedown', startVoiceRecording);
    micZone.addEventListener('mouseup', stopVoiceRecording);
    micZone.addEventListener('mouseleave', stopVoiceRecording);


    // 启动界面
    renderHistory();
</script>
</body>
</html>
