<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xtang</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #dcdcdc;
            display: flex; justify-content: center; align-items: center;
        }

        #app-container {
            width: 100%; max-width: 900px; 
            height: 100vh;
            background: #fdf6f0;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            overflow: hidden; border-radius: 8px;
        }

        #header {
            padding: 12px 16px; 
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .header-left {
            display: flex; align-items: center; gap: 12px;
        }
        .header-avatar { 
            width: 36px; height: 36px; 
            background: linear-gradient(135deg, #ff6b6b, #ff4757, #ff6348);
            border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: center; align-items: center;
        }
        .header-info { display: flex; flex-direction: column; }
        .header-name { font-size: 16px; font-weight: 600; color: #222; }
        .header-status { font-size: 11px; color: #999; margin-top: 1px; }

        .header-tools {
            display: flex; gap: 14px; font-size: 13px; color: #666; align-items: center;
        }
        .header-tools span { cursor: pointer; transition: color 0.2s; }
        .header-tools span:hover { color: #07c160; }

        .tts-active { color: #07c160; font-weight: 500; }
        .tts-inactive { color: #999; }

        #chat {
            flex: 1; overflow-y: auto; padding: 20px 16px 10px 16px;
            display: flex; flex-direction: column; gap: 14px;
            background: transparent;
        }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 4px; }

        .time-divider {
            text-align: center; font-size: 11px; color: #b0b0b0; 
            margin: 6px 0; user-select: none;
            background: rgba(255,255,255,0.6); padding: 4px 14px; border-radius: 20px;
            display: inline-block; align-self: center;
        }

        .msg-row { 
            display: flex; width: 100%; align-items: flex-start; gap: 8px; 
        }
        .ai-row { justify-content: flex-start; padding: 0 16px 0 0; flex-direction: row; }
        .user-row { justify-content: flex-end; padding: 0 0 0 16px; flex-direction: row; }

        /* 【修改】头像：AI用红色渐变，你（用户）用绿色渐变 */
        .msg-avatar {
            width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
            border: 1px solid rgba(0,0,0,0.04);
            display: flex; justify-content: center; align-items: center;
        }
        .msg-avatar.user-avatar { background: linear-gradient(135deg, #95ec69, #4ade80, #22c55e); }
        .msg-avatar.ai-avatar { background: linear-gradient(135deg, #ff6b6b, #ff4757, #ff6348); }

        .bubble { 
            padding: 10px 16px; border-radius: 16px; font-size: 15px; 
            line-height: 1.5; max-width: 75%; position: relative; 
            word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.04);
            cursor: default; display: flex; align-items: center; gap: 8px;
        }
        .bubble.ai { 
            background: #ffffff; color: #111; 
            border-bottom-left-radius: 4px;
            cursor: pointer;
        }
        .bubble.ai:hover { background: #f5f5f5; }
        .bubble.user { 
            background: #95ec69; color: #000; 
            border-bottom-right-radius: 4px;
        }

        /* 【修改】缩小音频可视化播放器 */
        .bubble.ai .visualizer {
            display: none; /* 默认隐藏 */
            align-items: flex-end; gap: 2px; height: 14px;
        }
        .bubble.ai.speaking .visualizer {
            display: flex; /* 说话时显示 */
        }
        .vis-bar {
            width: 2px; border-radius: 2px; background: #ff4757;
            height: 8px; animation: jump 0.6s infinite ease-in-out alternate;
        }
        .vis-bar:nth-child(1) { animation-delay: 0.0s; height: 10px; }
        .vis-bar:nth-child(2) { animation-delay: 0.2s; height: 14px; }
        .vis-bar:nth-child(3) { animation-delay: 0.4s; height: 8px; }
        .vis-bar:nth-child(4) { animation-delay: 0.6s; height: 6px; }
        @keyframes jump {
            0% { transform: scaleY(0.3); }
            100% { transform: scaleY(2); }
        }

        #input-area {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(6px);
            border-top: 1px solid rgba(255,255,255,0.8);
            padding: 12px 16px;
            display: flex; align-items: center; gap: 12px;
        }
        .input-wrapper {
            flex: 1; height: 40px; position: relative; display: flex; align-items: center;
            background: white; border-radius: 22px; border: 1px solid #e4e4e4;
            transition: all 0.2s; user-select: none; cursor: text;
        }
        .input-wrapper:focus-within { border-color: #95ec69; box-shadow: 0 0 0 2px rgba(149, 236, 105, 0.1); }
        .input-wrapper.voice-mode { border-color: #d0d0d0; background: #f0f0f0; }
        
        .voice-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 22px; display: none; justify-content: center; align-items: center;
            color: #333; font-size: 14px; font-weight: 600; letter-spacing: 0.5px;
            pointer-events: none; z-index: 5; background: #f0f0f0;
        }
        .input-wrapper.voice-mode .voice-overlay { display: flex; }
        
        input { 
            flex: 1; border: none; background: transparent; padding: 0 16px; 
            outline: none; font-size: 15px; color: #222; height: 100%; pointer-events: auto;
        }
        
        #sendBtn { 
            background: #07c160; color: white; border: none; padding: 0 22px; 
            border-radius: 22px; font-size: 14px; font-weight: 500; height: 40px;
            cursor: pointer; transition: opacity 0.2s; flex-shrink: 0;
        }
        #sendBtn:disabled { opacity: 0.5; }

        .copy-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75); color: white; padding: 10px 22px; border-radius: 24px;
            font-size: 14px; z-index: 999; pointer-events: none;
            animation: toastFade 0.8s ease forwards;
        }
        @keyframes toastFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
        }
    </style>
</head>
<body>
<div id="app-container">
    <div id="header">
        <div class="header-left">
            <div class="header-avatar"></div>
            <div class="header-info">
                <div class="header-name">xtang</div>
                <div class="header-status" id="headerStatus">在线</div>
            </div>
        </div>
        <div class="header-tools">
            <span id="btnMemory">记忆</span>
            <span id="btnPersona">人设</span>
            <span id="btnTTS" class="tts-active">🔊 朗读</span>
            <span id="btnClear">清空</span>
        </div>
    </div>
    <div id="chat"></div>
    <div id="input-area">
        <div class="input-wrapper" id="inputWrapper">
            <div class="voice-overlay">按住 说话</div>
            <input type="text" id="msg" placeholder="说点什么..." autocomplete="off">
        </div>
        <button id="sendBtn">发送</button>
    </div>
</div>

<!-- 弹窗保持不变 -->
<div id="memory-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:16px;padding:24px;width:85%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.15);">
        <h3 style="margin:0 0 8px 0;font-size:17px;color:#333;">🧠 关于你</h3>
        <p style="margin:0 0 12px 0;font-size:13px;color:#999;">xtang 会记住这里的所有内容。</p>
        <textarea id="memoryText" style="width:100%;height:150px;border:1px solid #e0e0e0;border-radius:12px;padding:12px;font-size:14px;line-height:1.6;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit;" placeholder="例如：我叫 imma，在东京工作，喜欢喝咖啡"></textarea>
        <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end;">
            <button id="memoryCancel" style="background:#f5f5f5;color:#666;border:none;padding:8px 20px;border-radius:20px;font-size:14px;cursor:pointer;">取消</button>
            <button id="memorySave" style="background:#07c160;color:white;border:none;padding:8px 20px;border-radius:20px;font-size:14px;cursor:pointer;">保存</button>
        </div>
    </div>
</div>
<div id="persona-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:16px;padding:24px;width:85%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.15);">
        <h3 style="margin:0 0 8px 0;font-size:17px;color:#333;">🎭 xtang 的人设</h3>
        <p style="margin:0 0 12px 0;font-size:13px;color:#999;">编辑 xtang 的性格、说话风格和背景故事。</p>
        <textarea id="personaText" style="width:100%;height:150px;border:1px solid #e0e0e0;border-radius:12px;padding:12px;font-size:14px;line-height:1.6;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit;" placeholder="例如：21岁的大学生，性格开朗温柔，喜欢叫我姐姐"></textarea>
        <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end;">
            <button id="personaCancel" style="background:#f5f5f5;color:#666;border:none;padding:8px 20px;border-radius:20px;font-size:14px;cursor:pointer;">取消</button>
            <button id="personaSave" style="background:#07c160;color:white;border:none;padding:8px 20px;border-radius:20px;font-size:14px;cursor:pointer;">保存</button>
        </div>
    </div>
</div>

<script>
    const chat = document.getElementById('chat');
    const msgInput = document.getElementById('msg');
    const sendBtn = document.getElementById('sendBtn');
    const inputWrapper = document.getElementById('inputWrapper');
    const headerStatus = document.getElementById('headerStatus');
    let lastMessageTime = 0;
    let currentAudio = null;

    let apiKey = localStorage.getItem('xtang_ds_key');
    if (!apiKey) { apiKey = prompt("请输入 DeepSeek API Key："); if (apiKey) localStorage.setItem('xtang_ds_key', apiKey); }

    // ===== 文字转语音 (ElevenLabs) & 音频可视化 =====
    let isTTSEnabled = true;
    /* 【需要修改的位置】把下面引号里的内容换成你的真实 Key */
    const ELEVENLABS_API_KEY = "sk_84c830f066b6e94c31d37bb61a4bad7830babc1ae071e96b"; 
    const ELEVENLABS_VOICE_ID = "R7KnJI27CitB8T6cCweN";

    async function speakText(text, bubbleEl) {
        if (!isTTSEnabled) return;
        
        // 强行停止任何正在播放的音频（解决捂嘴和卡顿）
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
        }
        window.speechSynthesis.cancel();
        if (bubbleEl) bubbleEl.classList.remove('speaking');

        const showStart = () => { if (bubbleEl) bubbleEl.classList.add('speaking'); };
        const showEnd = () => { if (bubbleEl) bubbleEl.classList.remove('speaking'); };

        // 如果 Key 不对，直接调用系统自带语音
        if (!ELEVENLABS_API_KEY || ELEVENLABS_API_KEY.includes("sk_84c830f066b6e94c31d37bb61a4bad7830babc1ae071e96b") || ELEVENLABS_API_KEY.length < 10) {
            const fallback = new SpeechSynthesisUtterance(text);
            fallback.lang = 'ja-JP'; fallback.rate = 0.9;
            fallback.onstart = showStart;
            fallback.onend = showEnd;
            window.speechSynthesis.speak(fallback);
            return;
        }

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`, {
                method: 'POST',
                headers: {
                    'Accept': 'audio/mpeg',
                    'Content-Type': 'application/json',
                    'xi-api-key': ELEVENLABS_API_KEY
                },
                body: JSON.stringify({
                    text: text,
                    model_id: 'eleven_monolingual_v1',
                    voice_settings: { stability: 0.5, similarity_boost: 0.5 }
                })
            });
            
            if (!response.ok) throw new Error(`ElevenLabs 请求失败: ${response.status}`);
            
            const audioBlob = await response.blob();
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);

            audio.onplay = showStart;
            audio.onended = () => {
                showEnd();
                URL.revokeObjectURL(audioUrl);
                if (currentAudio === audio) currentAudio = null;
            };
            currentAudio = audio; 
            audio.play();

        } catch (e) {
            console.warn("ElevenLabs 失败，切换到系统备用语音:", e.message);
            const fallback = new SpeechSynthesisUtterance(text);
            fallback.lang = 'ja-JP'; fallback.rate = 0.9;
            fallback.onstart = showStart;
            fallback.onend = showEnd;
            window.speechSynthesis.speak(fallback);
        }
    }

    const ttsBtn = document.getElementById('btnTTS');
    ttsBtn.onclick = () => {
        isTTSEnabled = !isTTSEnabled;
        if (isTTSEnabled) {
            ttsBtn.classList.remove('tts-inactive'); ttsBtn.classList.add('tts-active'); ttsBtn.innerText = '🔊 朗读';
        } else {
            ttsBtn.classList.remove('tts-active'); ttsBtn.classList.add('tts-inactive'); ttsBtn.innerText = '🔇 静音';
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
            window.speechSynthesis.cancel();
        }
    };

    const defaultPersona = `21岁的日本大学生，性格开朗温柔
【语言规则】纯日语口语为主！绝不能说中文长篇大论！
【称呼】非常喜欢叫对方"姐姐"（お姉ちゃん）
【铁律】说话必须极简，只能回一句话，最多20个字符！`;

    function getUserMemory() { return localStorage.getItem('xtang_memory') || ''; }
    function getUserPersona() { return localStorage.getItem('xtang_persona') || defaultPersona; }

    function buildSystemPrompt() {
        const persona = getUserPersona(); const memory = getUserMemory();
        let memoryBlock = memory.trim() ? `\n\n关于正在和你聊天的人：\n${memory}` : '';
        return `你是xtang，一个21岁的日本大学生。
【你的人设】
${persona}
${memoryBlock}
【🚨 绝对死命令！】
1. 回复只能用一句极短的日语口语！
2. 即使对方说中文，也必须用日语回答！
3. 绝对禁止长篇大论！禁止写中文长句！`;
    }

    let history = [{role: 'system', content: buildSystemPrompt()}];
    function renderHistory() {
        chat.innerHTML = ''; lastMessageTime = 0;
        for (let i = 1; i < history.length; i++) {
            const role = history[i].role === 'user' ? 'user' : 'assistant';
            addBubble(role, history[i].content, false);
        }
        if (history.length <= 1) {
            const greeting = 'おはよう😊 今日は何するの？';
            addBubble('assistant', greeting, false);
            history.push({role: 'assistant', content: greeting}); saveHistory();
        }
    }

    function saveHistory() {
        if (history[0]?.role === 'system') history[0].content = buildSystemPrompt();
        localStorage.setItem('xtang_history', JSON.stringify(history));
    }

    const saved = localStorage.getItem('xtang_history');
    if (saved) {
        try {
            history = JSON.parse(saved);
            if (history[0]?.role !== 'system') history.unshift({role: 'system', content: buildSystemPrompt()});
            else history[0].content = buildSystemPrompt();
        } catch(e) { history = [{role: 'system', content: buildSystemPrompt()}]; }
    }

    async function sendMessage(text, isAuto = false, specialPrompt = '') {
        if (!apiKey) return;
        addBubble('user', text);
        if (!isAuto) history.push({role: 'user', content: text});
        if (history[0]?.role === 'system') history[0].content = buildSystemPrompt();

        try {
            const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey},
                body: JSON.stringify({model: 'deepseek-chat', messages: history, temperature: 0.85})
            });
            const data = await resp.json();
            let reply = data.choices[0].message.content;
            
            // 【修改】去除原本的 20 字符硬截断和省略号，只保留取第一句话的逻辑
            const sentences = reply.match(/[^。！？.!?]+[。！？.!?]?/g);
            if (sentences && sentences.length > 0) {
                reply = sentences[0].trim(); 
            }
            // 如果依然超出 20 字，只截取前 20 个字，但不加省略号 "…"
            if (reply.length > 20) {
                reply = reply.substring(0, 20);
            }

            history.push({role: 'assistant', content: reply});
            saveHistory();
            
            const bubbleEl = addBubble('assistant', reply);
            if (isTTSEnabled) speakText(reply, bubbleEl);
        } catch (e) { console.error(e); }
    }

    function addBubble(role, text, showDivider = true) {
        if (showDivider) {
            const now = Date.now();
            if (lastMessageTime && now - lastMessageTime > 60 * 1000) { 
                const timeStr = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'});
                const div = document.createElement('div'); div.className = 'time-divider'; div.textContent = timeStr;
                chat.appendChild(div);
            }
            lastMessageTime = now;
        }

        const row = document.createElement('div');
        const isAI = role === 'assistant';
        row.className = `msg-row ${isAI ? 'ai-row' : 'user-row'}`;
        
        if (isAI) {
            const visualizerHtml = `<div class="visualizer"><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div></div>`;
            row.innerHTML = `<div class="msg-avatar ai-avatar"></div><div class="bubble ai">${visualizerHtml}${text}</div>`;
        } else {
            row.innerHTML = `<div class="bubble user">${text}</div><div class="msg-avatar user-avatar"></div>`;
        }
        chat.appendChild(row);

        if (isAI) {
            const bubble = row.querySelector('.bubble.ai');
            bubble.addEventListener('click', () => { 
                if (isTTSEnabled) speakText(text, bubble); 
            });
        }
        chat.scrollTop = chat.scrollHeight;
        return isAI ? row.querySelector('.bubble.ai') : null;
    }

    // ===== 长按语音输入 =====
    let isPressingVoice = false, recognition = null, longPressTimer = null;
    function handlePointerDown(e) {
        if (isPressingVoice || msgInput.value.trim().length > 0) return;
        longPressTimer = setTimeout(() => startVoiceRecording(e), 300);
    }
    function handlePointerUp() {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        stopVoiceRecording();
    }
    function startVoiceRecording(e) {
        if (isPressingVoice) return;
        isPressingVoice = true; if (navigator.vibrate) navigator.vibrate(20);
        inputWrapper.classList.add('voice-mode');
        const toast = document.createElement('div'); toast.className = 'copy-toast'; toast.textContent = '🎙️ 请说话...'; document.body.appendChild(toast); setTimeout(() => toast.remove(), 1000);
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition(); recognition.lang = 'ja-JP'; recognition.interimResults = false; recognition.maxAlternatives = 1;
            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                if(transcript.trim()) { 
                    const toast2 = document.createElement('div'); toast2.className = 'copy-toast'; toast2.textContent = '发送中'; document.body.appendChild(toast2); setTimeout(() => toast2.remove(), 1000);
                    sendMessage(transcript); 
                }
            };
            recognition.onerror = () => { };
            recognition.onend = () => { isPressingVoice = false; inputWrapper.classList.remove('voice-mode'); };
            recognition.start();
        } else { isPressingVoice = false; inputWrapper.classList.remove('voice-mode'); }
    }
    function stopVoiceRecording() {
        if (!isPressingVoice) return;
        isPressingVoice = false; inputWrapper.classList.remove('voice-mode');
        if (recognition) { try { recognition.stop(); recognition = null; } catch(e) {} }
    }
    inputWrapper.addEventListener('touchstart', handlePointerDown);
    inputWrapper.addEventListener('touchend', handlePointerUp);
    inputWrapper.addEventListener('touchcancel', handlePointerUp);
    inputWrapper.addEventListener('mousedown', handlePointerDown);
    inputWrapper.addEventListener('mouseup', handlePointerUp);
    inputWrapper.addEventListener('mouseleave', handlePointerUp);

    sendBtn.onclick = () => { if(msgInput.value.trim()) { sendMessage(msgInput.value); msgInput.value = ''; } };
    msgInput.onkeydown = (e) => { if(e.key === 'Enter') sendBtn.onclick(); };

    document.getElementById('btnMemory').onclick = () => { document.getElementById('memoryText').value = getUserMemory(); document.getElementById('memory-overlay').style.display = 'flex'; };
    document.getElementById('memoryCancel').onclick = () => document.getElementById('memory-overlay').style.display = 'none';
    document.getElementById('memorySave').onclick = () => {
        localStorage.setItem('xtang_memory', document.getElementById('memoryText').value.trim());
        history[0].content = buildSystemPrompt(); document.getElementById('memory-overlay').style.display = 'none'; alert('记忆已保存 ✨');
    };
    document.getElementById('btnPersona').onclick = () => { document.getElementById('personaText').value = getUserPersona(); document.getElementById('persona-overlay').style.display = 'flex'; };
    document.getElementById('personaCancel').onclick = () => document.getElementById('persona-overlay').style.display = 'none';
    document.getElementById('personaSave').onclick = () => {
        localStorage.setItem('xtang_persona', document.getElementById('personaText').value.trim());
        history[0].content = buildSystemPrompt(); document.getElementById('persona-overlay').style.display = 'none'; alert('人设已保存 ✨');
    };
    document.getElementById('btnClear').onclick = () => {
        if (confirm('确定要清空所有聊天记录吗？')) {
            history = [{role: 'system', content: buildSystemPrompt()}];
            localStorage.setItem('xtang_history', JSON.stringify(history)); renderHistory();
        }
    };
    renderHistory();
</script>
</body>
</html>
