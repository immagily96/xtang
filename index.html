<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xtang</title>
    <style>
        :root { --soft-green: #8fb39e; --bg: linear-gradient(135deg, #f0f7f4, #fff5e6); }
        body { background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .box { width: 85%; max-width: 400px; text-align: center; }
        #trigger { width: 120px; height: 120px; background: var(--soft-green); border-radius: 50%; margin: 0 auto 30px; box-shadow: 0 5px 15px rgba(143,179,158,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #output { font-size: 1.2rem; margin-bottom: 10px; color: #374151; }
        #hint { font-size: 0.9rem; color: #7a9ead; background: rgba(255,255,255,0.6); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
<div class="box">
    <div id="trigger">Start</div>
    <div id="output">点击开始练习</div>
    <div id="hint">等待语音输入...</div>
    <div id="settings" style="margin-top:20px; opacity:0.5;">
        <input type="password" id="dsKey" placeholder="DeepSeek Key" style="width:80px;">
        <input type="password" id="elKey" placeholder="ElevenLabs Key" style="width:80px;">
    </div>
</div>

<script>
    const trigger = document.getElementById('trigger'), out = document.getElementById('output'), hint = document.getElementById('hint');
    // 强制极致压缩 Prompt
    const systemPrompt = `xtang身份：极简日语私教。规则：1.仅输出JSON ` + '{"japanese":"日语(20字内)","correction":"中文(10字内)"}' + `. 2.日语包含追问。3.禁止寒暄。`;
    let history = [{role: 'system', content: systemPrompt}];

    trigger.onclick = () => {
        if(!localStorage.getItem('ds')) { alert("请在下方输入API Key"); return; }
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ja-JP'; rec.start(); trigger.innerText = "Listening";
        rec.onresult = async (e) => {
            trigger.innerText = "Thinking";
            history.push({role: 'user', content: e.results[0][0].transcript});
            const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('ds')},
                body: JSON.stringify({model: 'deepseek-chat', messages: history})
            });
            const res = await resp.json();
            const content = JSON.parse(res.choices[0].message.content.match(/\{[\s\S]*\}/)[0]);
            history.push({role: 'assistant', content: JSON.stringify(content)});
            out.innerText = content.japanese; hint.innerText = "💡 " + content.correction;
            playAudio(content.japanese);
        };
    };

    async function playAudio(text) {
        const resp = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/WpkOjWrdwRn56WUVBAVk`, {
            method: 'POST', headers: {'xi-api-key': localStorage.getItem('el'), 'Content-Type': 'application/json'},
            body: JSON.stringify({text: text, model_id: "eleven_multilingual_v2"})
        });
        const blob = await resp.blob();
        const audio = new Audio(URL.createObjectURL(blob));
        audio.play(); audio.onended = () => trigger.innerText = "Start";
    }
    document.querySelectorAll('input').forEach(i => i.onblur = () => localStorage.setItem(i.id === 'dsKey' ? 'ds' : 'el', i.value));
</script>
</body>
</html>
