<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imma & xtang 的专属日语口语教室</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-main: #f8fafc;
            --chat-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --user-bubble: linear-gradient(135deg, #6366f1, #4f46e5);
            --ai-bubble: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-main); color: var(--text-dark); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .app-window { width: 100%; max-width: 480px; background: #ffffff; height: 100vh; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.04); position: relative; }
        
        /* 顶部Header */
        header { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; background: #ffffff; z-index: 10; }
        header h2 { margin: 0; font-size: 18px; font-weight: 700; color: var(--text-dark); display: flex; align-items: center; gap: 8px; }
        
        /* 折叠菜单样式 */
        .toggle-settings-btn { background: #f1f5f9; border: none; padding: 8px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .toggle-settings-btn:hover { background: #e2e8f0; color: var(--text-dark); }
        .settings-drawer { background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 0 20px; max-height: 0; overflow: hidden; opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .settings-drawer.open { padding: 15px 20px; max-height: 300px; opacity: 1; }
        
        label { font-weight: 600; display: block; margin-top: 10px; color: var(--text-dark); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 10px 14px; margin-top: 4px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 13px; background: #ffffff; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        
        /* 状态条 */
        .status-banner { background: #eff6ff; color: #1e40af; font-size: 13px; font-weight: 500; text-align: center; padding: 10px; border-bottom: 1px solid #dbeafe; }
        .status-banner b { color: #2563eb; }

        /* 聊天滚动区 */
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: #f8fafc; }
        .chat-line { display: flex; flex-direction: column; max-width: 85%; animation: fadeIn 0.3s ease forwards; }
        
        /* 气泡精调 */
        .user-box { align-self: flex-end; }
        .user-box .bubble { background: var(--user-bubble); color: #ffffff; border-radius: 20px 20px 4px 20px; box-shadow: 0 4px 10px rgba(99,102,241,0.2); }
        .ai-box { align-self: flex-start; max-width: 90%; }
        .ai-box .bubble { background: var(--ai-bubble); color: var(--text-dark); border-radius: 20px 20px 20px 4px; border: 1px solid #e2e8f0; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        
        .bubble { padding: 12px 16px; font-size: 15px; line-height: 1.5; word-break: break-all; white-space: pre-wrap; }
        .sender-title { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; padding-left: 6px; }
        .user-box .sender-title { text-align: right; padding-right: 6px; }

        /* 纠错部分（纯中文提示，绝不发声） */
        .correction-text { margin-top: 10px; padding: 10px 12px; background: #f1f5f9; border-radius: 12px; color: #334155; font-size: 13px; border-left: 4px solid #f43f5e; }
        .correction-text b { color: #e11d48; font-weight: 600; }

        /* 底部控制区 */
        .footer-controls { padding: 20px; background: #ffffff; border-top: 1px solid #f1f5f9; display: flex; gap: 12px; align-items: center; }
        
        /* 麦克风动态呼吸灯 */
        .btn-main { background: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 24px; cursor: pointer; flex: 1; font-size: 14px; font-weight: 700; box-shadow: 0 4px 12px rgba(99,102,241,0.3); display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-main:active { transform: scale(0.98); }
        
        @keyframes recordPulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .btn-main.recording { background: #ef4444; animation: recordPulse 1.5s infinite; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }

        .btn-secondary { background: #f1f5f9; color: #475569; border: none; width: 48px; height: 48px; border-radius: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .btn-secondary:hover { background: #e2e8f0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-window">
        <!-- 头部 -->
        <header>
            <h2>🌸 xtang 口语对练</h2>
            <button class="toggle-settings-btn" id="toggleSettings">⚙️ 設定（展开配置）</button>
        </header>

        <!-- 隐藏的配置抽屉 -->
        <div class="settings-drawer" id="settingsDrawer">
            <label>DeepSeek API Key:</label>
            <input type="password" id="dsKey" placeholder="sk-..." />

            <label>ElevenLabs API Key:</label>
            <input type="password" id="elKey" placeholder="ElevenLabs 密钥" />

            <label>专属 Voice ID:</label>
            <input type="text" id="voiceId" placeholder="粘贴你的声音 ID" value="CNjSc97eY3UMS8XAr4S5" />
        </div>

        <!-- 中日结合状态栏 -->
        <div id="status" class="status-banner">⏳ 履歴を読み込み中...（正在加载历史记忆...）</div>

        <!-- 聊天区域 -->
        <div class="chat-body" id="history"></div>

        <!-- 底部栏 -->
        <div class="footer-controls">
            <button id="clearBtn" class="btn-secondary" title="清空全部记忆">🧹</button>
            <button id="talkBtn" class="btn-main">🎤 スタート（点击开始说话）</button>
        </div>
    </div>

    <script>
        const talkBtn = document.getElementById('talkBtn');
        const clearBtn = document.getElementById('clearBtn');
        const toggleSettings = document.getElementById('toggleSettings');
        const settingsDrawer = document.getElementById('settingsDrawer');
        const statusDiv = document.getElementById('status');
        const historyDiv = document.getElementById('history');
        
        const dsKeyInput = document.getElementById('dsKey');
        const elKeyInput = document.getElementById('elKey');
        const voiceIdInput = document.getElementById('voiceId');

        let isListening = false;
        let recognition;
        let conversationHistory = [];
        let currentAudio = null;

        // 折叠菜单逻辑
        toggleSettings.onclick = () => {
            const isOpen = settingsDrawer.classList.toggle('open');
            toggleSettings.textContent = isOpen ? '🔼 設定を閉じる（隐藏配置）' : '⚙️ 設定（展开配置）';
        };

        const systemPrompt = `你现在是一个非常有生命力、活泼、富有幽默感且极其温柔的日本本土朋友兼口语老师 xtang。你的学生和聊天伙伴叫做 imma。
        
        【🚨🚨🚨语言强制限制规则 - 必须死板执行！！！🚨🚨🚨】
        你的输出必须严格符合给定的 JSON 格式，其中：
        1. "japanese" 字段：必须全用【日语】撰写。这是你对 imma 说的话。
        2. "correction" 字段：必须【100% 全部使用中文（简体中文）】撰写！！！绝对不允许出现任何日文字符、假名、日文汉字或日文标点符号！如果你想提及某个日语词汇，必须用中文描述（例如：“你把‘donata’用错了，应该用礼貌的对方...”）。再次重申：该字段哪怕出现一个日语假名都算彻底违规！

        【聊天与对练规则】：
        1. 【语气生动】: 日语部分要像真正的同龄日本朋友，多用语气词（如「ええっ！」「ほんとに？」「〜ね」「〜よ」）和丰富的颜文字/表情符号（🌸、✨、🤣、🥺、💡）。称呼用户为 imma。
        2. 【主动互动】: 不要只回答问题，要展现情绪，分享日本日常，并在句尾自然向 imma 抛出新的日常问题引导对话继续。
        3. 【核心语法审计】: imma 最近正在巩固「や」与「など」的搭配。如果他在说话时漏掉或用错，请在 "correction"（纯中文小提示）中指出。
        4. 【礼貌语境审计】: 涉及国家、方向时，审查 imma 是否用了更显礼貌的「どちら」；涉及询问电话对方是谁或询问身份时，审查他是否用了更礼貌的「どちらさまですか」。

        必须严格遵守以下 JSON 格式输出，不要输出任何额外的标记或Markdown文本：
        <reply>
        {
            "japanese": "这里是纯日语对话内容",
            "correction": "这里是纯中文的教学、纠错或夸奖内容。绝对不能带有任何日语字符！"
        }
        </reply>`;

        function initVoiceChat() {
            if (localStorage.getItem('sakura_ds_key')) dsKeyInput.value = localStorage.getItem('sakura_ds_key');
            if (localStorage.getItem('sakura_el_key')) elKeyInput.value = localStorage.getItem('sakura_el_key');
            
            if (localStorage.getItem('sakura_v_id')) {
                voiceIdInput.value = localStorage.getItem('sakura_v_id');
            } else {
                voiceIdInput.value = "CNjSc97eY3UMS8XAr4S5";
            }

            const savedHistory = localStorage.getItem('sakura_voice_history');
            historyDiv.innerHTML = '';

            if (savedHistory) {
                try {
                    conversationHistory = JSON.parse(savedHistory);
                    conversationHistory.forEach(msg => {
                        if (msg.role === 'user') {
                            appendRender('imma', msg.content, 'user-box');
                        } else if (msg.role === 'assistant') {
                            parseAndRenderAi(msg.content);
                        }
                    });
                    statusDiv.innerHTML = '🌸 <b>記憶が目覚めました！</b>いつでもどうぞ（随时可以开始对话）';
                } catch (e) {
                    resetToDefault();
                }
            } else {
                resetToDefault();
            }
        }

        function resetToDefault() {
            conversationHistory = [{ role: 'system', content: systemPrompt }];
            localStorage.setItem('sakura_voice_history', JSON.stringify(conversationHistory));
            appendRender('xtang', 'やった！🌸 またおしゃべりしに来てくれたんだね！imma、嬉しい！✨ 今日はどんな一日だった？何でも声で教えてね！😊', 'ai-box', '太棒啦！🌸 又来找我聊天了呢，imma！真开心！✨ 今天过得怎么样？用声音告诉我吧！😊');
            statusDiv.innerHTML = '🎤 <b>ボタンを押して話してください</b>（请点击下方按钮开始说话）';
        }

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP'; 
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                statusDiv.innerHTML = '🎙️ <b>聞いています...</b> 日本語で話してください（倾听中... 请对准麦克风大声说日语）';
                statusDiv.style.background = '#fef2f2';
                statusDiv.style.color = '#dc2626';
                talkBtn.classList.add('recording');
                talkBtn.innerHTML = '🛑 録音中... クリ击して送信（再次点击发送）';
            };

            recognition.onerror = (event) => {
                statusDiv.innerHTML = '❌ <b>録音エラー</b>（录音异常中断）: ' + event.error;
                statusDiv.style.background = '#eff6ff';
                statusDiv.style.color = '#1e40af';
                isListening = false;
                talkBtn.classList.remove('recording');
                talkBtn.innerHTML = '🎤 クリックしてスタート（点击开始说话）';
            };

            recognition.onend = () => {
                if (isListening) {
                    isListening = false;
                    talkBtn.classList.remove('recording');
                    talkBtn.innerHTML = '🎤 クリックしてスタート（点击开始说话）';
                }
            };

            recognition.onresult = async (event) => {
                const userSpeech = event.results[0][0].transcript;
                appendRender('imma', userSpeech, 'user-box');
                
                conversationHistory.push({ role: 'user', content: userSpeech });
                localStorage.setItem('sakura_voice_history', JSON.stringify(conversationHistory));
                
                await callDeepSeek();
            };
        } else {
            statusDiv.innerHTML = '❌ <b>音声認識非対応</b>（浏览器未提供原生态语音支持）';
            talkBtn.disabled = true;
        }

        talkBtn.onclick = () => {
            const dsKey = dsKeyInput.value.trim();
            const elKey = elKeyInput.value.trim();
            const vId = voiceIdInput.value.trim();
            
            if (!dsKey || !elKey || !vId) {
                settingsDrawer.classList.add('open');
                toggleSettings.textContent = '🔼 設定を闭じる（隐藏配置）';
                alert('请先填写完整的 API 密钥配置信息！');
                return;
            }

            localStorage.setItem('sakura_ds_key', dsKey);
            localStorage.setItem('sakura_el_key', elKey);
            localStorage.setItem('sakura_v_id', vId);

            if (!isListening) {
                if (currentAudio) currentAudio.pause();
                recognition.start();
                isListening = true;
            } else {
                recognition.stop();
                isListening = false;
                talkBtn.classList.remove('recording');
                talkBtn.innerHTML = '🎤 クリックしてスタート（点击开始说话）';
            }
        };

        async function callDeepSeek() {
            statusDiv.innerHTML = '🤖 <b>xtangが返信を考えています...</b>（xtang 正在飞速组织回信...）';
            statusDiv.style.background = '#f0fdf4';
            statusDiv.style.color = '#166534';

            // 🌟 确保每次发送时使用最新的系统提示词
            if(conversationHistory.length > 0 && conversationHistory[0].role === 'system') {
                conversationHistory[0].content = systemPrompt;
            }

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${dsKeyInput.value.trim()}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: conversationHistory,
                        temperature: 0.6
                    })
                });

                const data = await response.json();
                if (data.choices && data.choices[0]) {
                    const rawContent = data.choices[0].message.content;
                    
                    conversationHistory.push({ role: 'assistant', content: rawContent });
                    localStorage.setItem('sakura_voice_history', JSON.stringify(conversationHistory));
                    
                    const textToVoice = parseAndRenderAi(rawContent);
                    if (textToVoice) {
                        await speakWithElevenLabs(textToVoice);
                    }
                } else {
                    statusDiv.innerHTML = '❌ <b>サーバーエラー</b>（接口核心报错，请检查余额）';
                }
            } catch (error) {
                statusDiv.innerHTML = '❌ <b>通信エラー</b>（网络通道异常，请重试）';
            }
        }

        async function speakWithElevenLabs(text) {
            statusDiv.innerHTML = '🎵 <b>音声を生成中...</b>（正在渲染 ElevenLabs 真人声线...）';
            statusDiv.style.background = '#fffbeb';
            statusDiv.style.color = '#d97706';

            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceIdInput.value.trim()}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'xi-api-key': elKeyInput.value.trim()
                    },
                    body: JSON.stringify({
                        text: text,
                        model_id: 'eleven_multilingual_v2', 
                        voice_settings: { stability: 0.45, similarity_boost: 0.8 }
                    })
                });

                if (!response.ok) throw new Error();

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                
                statusDiv.innerHTML = '🔊 <b>xtangが話しています...</b>（xtang 正在对你说话...）';
                statusDiv.style.background = '#f0fdf4';
                statusDiv.style.color = '#166534';

                currentAudio = new Audio(audioUrl);
                currentAudio.play();

                currentAudio.onended = () => {
                    statusDiv.innerHTML = '✅ <b>次の返信を待っています！</b>（听完啦，期待你下一句回信！）';
                    statusDiv.style.background = '#f8fafc';
                    statusDiv.style.color = '#64748b';
                };
            } catch (error) {
                statusDiv.innerHTML = '❌ <b>音声エラー</b>（声音合成失败，请核对 ElevenLabs Key）';
            }
        }

        function parseAndRenderAi(rawContent) {
            const jsonMatch = rawContent.match(/<reply>([\s\S]*?)<\/reply>/);
            if (jsonMatch) {
                try {
                    const replyObj = JSON.parse(jsonMatch[1].trim());
                    appendRender('xtang', replyObj.japanese, 'ai-box', replyObj.correction);
                    return replyObj.japanese; 
                } catch (e) {
                    appendRender('xtang', rawContent, 'ai-box');
                    return rawContent;
                }
            } else {
                appendRender('xtang', rawContent, 'ai-box');
                return rawContent;
            }
        }

        function appendRender(sender, text, className, correction = '') {
            const wrapper = document.createElement('div');
            wrapper.className = `chat-line ${className}`;
            
            const title = document.createElement('div');
            title.className = 'sender-title';
            title.textContent = sender;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;
            
            if (correction) {
                const corrDiv = document.createElement('div');
                corrDiv.className = 'correction-text';
                corrDiv.innerHTML = `💡 <b>アドバイス（小提示）：</b><br>${correction}`;
                bubble.appendChild(corrDiv);
            }
            
            wrapper.appendChild(title);
            wrapper.appendChild(bubble);
            historyDiv.appendChild(wrapper);
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        clearBtn.onclick = () => {
            if (confirm('确定清除所有语音通话记忆吗？')) {
                localStorage.removeItem('sakura_voice_history');
                initVoiceChat();
            }
        };

        initVoiceChat();
    </script>
</body>
</html>
