<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>xtang</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, sans-serif;
            background: #ededed;
        }

        body.theme-light { background: #ededed; }
        body.theme-dark { background: #2c2c2c; }
        body.theme-grid {
            background-color: #f5f5f5;
            background-image:
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        body.theme-warm { background: #fdf6f0; }

        #header {
            position: fixed; top: 0; left: 0; right: 0; height: 44px;
            background: #f7f7f7; border-bottom: 1px solid #dcdcdc;
            display: flex; align-items: center; justify-content: flex-end;
            padding: 0 10px; z-index: 11; gap: 8px;
        }

        #chat {
            position: fixed; top: 44px; left: 0; right: 0; bottom: 50px;
            overflow-y: auto; padding: 10px 14px;
            display: flex; flex-direction: column; gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .bubble {
            max-width: 78%; padding: 8px 12px; border-radius: 16px;
            font-size: 14px; line-height: 1.35; word-wrap: break-word;
            position: relative; cursor: default;
        }
        .ai {
            background: white; align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        body.theme-dark .ai { background: #3a3a3a; color: #eee; }
        .ai::after {
            content: ''; position: absolute; bottom: 0; left: -6px;
            width: 0; height: 0;
            border-right: 7px solid white; border-top: 7px solid transparent;
        }
        body.theme-dark .ai::after { border-right-color: #3a3a3a; }

        .user {
            background: #95ec69; align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .user::after {
            content: ''; position: absolute; bottom: 0; right: -6px;
            width: 0; height: 0;
            border-left: 7px solid #95ec69; border-top: 7px solid transparent;
        }
        .user .msg-status {
            position: absolute; bottom: 3px; right: -16px;
            font-size: 10px; color: #aaa;
        }

        .bubble:active { opacity: 0.7; }
        .copy-toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7); color: white;
            padding: 6px 14px; border-radius: 16px; font-size: 12px;
            z-index: 999; pointer-events: none;
            animation: toastFade 1.2s ease forwards;
        }
        @keyframes toastFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        .typing-bubble {
            align-self: flex-start; background: white;
            padding: 10px 14px; border-radius: 16px;
            border-bottom-left-radius: 4px;
            display: flex; align-items: center; gap: 3px; position: relative;
        }
        body.theme-dark .typing-bubble { background: #3a3a3a; }
        .typing-bubble::after {
            content: ''; position: absolute; bottom: 0; left: -6px;
            width: 0; height: 0;
            border-right: 7px solid white; border-top: 7px solid transparent;
        }
        body.theme-dark .typing-bubble::after { border-right-color: #3a3a3a; }
        .typing-dot {
            width: 6px; height: 6px; border-radius: 50%; background: #bbb;
            animation: dotBounce 1.2s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .time-divider {
            text-align: center; font-size: 11px; color: #999;
            margin: 4px 0; user-select: none;
        }

        #context-menu {
            display: none; position: fixed; z-index: 200;
            background: white; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.18);
            padding: 6px 0; min-width: 120px;
        }
        #context-menu.show { display: block; }
        #context-menu .menu-item {
            padding: 10px 18px; font-size: 14px; color: #333;
            cursor: pointer; white-space: nowrap;
        }
        #context-menu .menu-item:active { background: #f5f5f5; }

        #quick-replies {
            position: fixed; top: 44px; left: 0; right: 0; height: 0;
            overflow: hidden; z-index: 9;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(6px);
            border-bottom: 1px solid #e0e0e0;
            transition: height 0.2s ease;
            display: flex; align-items: center; gap: 6px;
            padding: 0 10px; flex-wrap: nowrap; overflow-x: auto;
        }
        #quick-replies.open { height: 40px; }
        .quick-tag {
            flex-shrink: 0; background: #f0f0f0; border: none;
            padding: 5px 10px; border-radius: 14px; font-size: 12px;
            color: #333; cursor: pointer; white-space: nowrap;
        }
        .quick-tag:active { background: #e0e0e0; }

        #input-area {
            position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
            background: #f7f7f7; display: flex; padding: 6px 10px;
            border-top: 1px solid #dcdcdc; align-items: center;
            z-index: 10; gap: 6px;
        }
        input {
            flex: 1; border: 1px solid #ccc; border-radius: 16px;
            padding: 6px 12px; font-size: 14px; outline: none; background: white;
        }
        button {
            background: #07c160; color: white; border: none;
            padding: 6px 12px; border-radius: 16px; font-size: 13px;
            white-space: nowrap; cursor: pointer;
        }
        button:disabled { background: #aaa; }
        
        /* 底部功能按钮统一样式 */
        #quickToggle, #voiceBtn {
            background: #f0f0f0; color: #555; font-size: 14px;
            padding: 6px 8px; border-radius: 16px; border: none; cursor: pointer;
        }
        #voiceBtn:active, #quickToggle:active { background: #e0e0e0; }

        #top-bar {
            display: flex; gap: 4px; align-items: center;
        }
        .top-btn {
            background: rgba(255,255,255,0.8); border: none;
            padding: 3px 7px; border-radius: 8px; font-size: 10px;
            color: #666; cursor: pointer; backdrop-filter: blur(4px);
        }
        .top-btn.active { background: #6366f1; color: white; }

        #memory-overlay, #persona-overlay {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); z-index: 100;
            justify-content: center; align-items: center;
        }
        #memory-overlay.show, #persona-overlay.show { display: flex; }
        #memory-card, #persona-card {
            background: white; border-radius: 16px; padding: 20px;
            width: 85%; max-width: 360px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        #memory-card h3, #persona-card h3 { margin: 0 0 8px 0; font-size: 17px; color: #333; }
        #memory-card p, #persona-card p { margin: 0 0 10px 0; font-size: 12px; color: #999; }
        #memory-card textarea, #persona-card textarea {
            width: 100%; height: 180px; border: 1px solid #ddd;
            border-radius: 10px; padding: 10px; font-size: 14px;
            line-height: 1.6; outline: none; resize: vertical;
            box-sizing: border-box; font-family: -apple-system, sans-serif;
        }
        #memory-card .btn-row, #persona-card .btn-row {
            display: flex; gap: 10px; margin-top: 12px; justify-content: flex-end;
        }
        #memory-card .btn-cancel, #persona-card .btn-cancel {
            background: #f0f0f0; color: #666; border: none;
            padding: 8px 16px; border-radius: 20px; font-size: 14px;
        }
        #memory-card .btn-save, #persona-card .btn-save {
            background: #07c160; color: white; border: none;
            padding: 8px 16px; border-radius: 20px; font-size: 14px;
        }
    </style>
</head>
<body class="theme-light">

<div id="header">
    <div id="top-bar">
        <button class="top-btn" id="dailyBtn" title="每日一句">📖</button>
        <button class="top-btn" id="autoMsgBtn" title="主动消息">🔔</button>
        <button class="top-btn" id="personaBtn">人设</button>
        <button class="top-btn" id="themeBtn">🎨</button>
        <button class="top-btn" id="memoryBtn">记忆</button>
        <button class="top-btn" id="clearBtn">清空</button>
    </div>
</div>

<div id="chat"></div>

<div id="context-menu">
    <div class="menu-item" data-action="copy">📋 复制</div>
    <div class="menu-item" data-action="delete">🗑️ 删除</div>
</div>

<div id="quick-replies">
    <button class="quick-tag" data-text="わかった！">わかった！</button>
    <button class="quick-tag" data-text="すごいね！">すごいね！</button>
    <button class="quick-tag" data-text="ありがとう">ありがとう</button>
    <button class="quick-tag" data-text="そうなんだ">そうなんだ</button>
    <button class="quick-tag" data-text="ごめんね">ごめんね</button>
    <button class="quick-tag" data-text="また後でね">また後でね</button>
</div>

<div id="memory-overlay">
    <div id="memory-card">
        <h3>✏️ 关于你</h3>
        <p>xtang 会记住这里的所有内容。</p>
        <textarea id="memoryText" placeholder="例如：&#10;我叫 imma&#10;在东京工作&#10;喜欢喝咖啡&#10;最近在学日语，N4 水平"></textarea>
        <div class="btn-row">
            <button class="btn-cancel" id="memoryCancel">取消</button>
            <button class="btn-save" id="memorySave">保存</button>
        </div>
    </div>
</div>

<div id="persona-overlay">
    <div id="persona-card">
        <h3>🎭 xtang 的人设</h3>
        <p>编辑 xtang 的性格、说话风格和背景故事。</p>
        <textarea id="personaText" placeholder="例如：&#10;22岁的大学生，性格开朗温柔&#10;喜欢叫我姐姐&#10;有点天然呆但很真诚&#10;在东京读设计专业&#10;喜欢摄影和咖啡"></textarea>
        <div class="btn-row">
            <button class="btn-cancel" id="personaCancel">取消</button>
            <button class="btn-save" id="personaSave">保存</button>
        </div>
    </div>
</div>

<div id="input-area">
    <button id="quickToggle" title="快捷短语">⚡</button>
    <!-- 修改这里：语音按钮移到输入框旁边了 -->
    <button id="voiceBtn" title="语音输入">🎤</button>
    <input type="text" id="msg" placeholder="说点什么..." autocomplete="off">
    <button id="sendBtn">发送</button>
</div>

<script>
    const chat = document.getElementById('chat');
    const msgInput = document.getElementById('msg');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const memoryBtn = document.getElementById('memoryBtn');
    const personaBtn = document.getElementById('personaBtn');
    const memoryOverlay = document.getElementById('memory-overlay');
    const memoryText = document.getElementById('memoryText');
    const memoryCancel = document.getElementById('memoryCancel');
    const memorySave = document.getElementById('memorySave');
    const personaOverlay = document.getElementById('persona-overlay');
    const personaText = document.getElementById('personaText');
    const personaCancel = document.getElementById('personaCancel');
    const personaSave = document.getElementById('personaSave');
    const quickToggle = document.getElementById('quickToggle');
    const quickReplies = document.getElementById('quick-replies');
    const themeBtn = document.getElementById('themeBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const autoMsgBtn = document.getElementById('autoMsgBtn');
    const dailyBtn = document.getElementById('dailyBtn');
    const contextMenu = document.getElementById('context-menu');

    const defaultPersona = `22岁的大学生，性格开朗温柔
喜欢叫对方"姐姐"
有点天然呆但很真诚
在东京读设计专业
喜欢摄影和咖啡
偶尔会撒娇，但该认真的时候很可靠
说话语气轻松活泼，带一点年轻人的慵懒感
正在自学中文，会一点点初级词汇，偶尔在句子末尾蹦出几个简单的中文词，比如"谢谢"、"好吃"、"厉害"、"好想你"、"好开心"之类的，显得很努力在学中文
聊天时喜欢用emoji和颜文字表达情绪，比如😊✨🥺💕(≧▽≦)(´；ω；｀)，让对话更生动`;

    const themes = ['theme-light', 'theme-dark', 'theme-grid', 'theme-warm'];
    let themeIdx = 0;
    const savedTheme = localStorage.getItem('xtang_theme');
    if (savedTheme && themes.includes(savedTheme)) { document.body.className = savedTheme; themeIdx = themes.indexOf(savedTheme); }
    themeBtn.onclick = () => {
        themeIdx = (themeIdx + 1) % themes.length;
        document.body.className = themes[themeIdx];
        localStorage.setItem('xtang_theme', themes[themeIdx]);
    };

    let apiKey = localStorage.getItem('xtang_ds_key');
    if (!apiKey) { apiKey = prompt("请输入 DeepSeek API Key："); if (apiKey) localStorage.setItem('xtang_ds_key', apiKey); }

    function getUserMemory() { return localStorage.getItem('xtang_memory') || ''; }
    function getUserPersona() { return localStorage.getItem('xtang_persona') || defaultPersona; }

    function getCurrentTimeString() {
        const now = new Date();
        return now.toLocaleString('zh-CN', { weekday: 'long', hour: '2-digit', minute: '2-digit' });
    }

    function buildSystemPrompt() {
        const persona = getUserPersona();
        const memory = getUserMemory();
        const timeStr = getCurrentTimeString();
        let memoryBlock = memory.trim() ? `\n\n关于正在和你聊天的人（自然融入对话，不要刻意背诵）：\n${memory}` : '';
        return `你是xtang，以下是你的完整人设。请严格按照人设扮演，不要跳出角色。

【你的人设】
${persona}

【当前时间】
${timeStr}
（你可以根据时间调整语气，比如深夜说"早点休息ね"，早上说"おはよう"，但不要在每条消息里都提时间，自然就好）

【对话规则】
1. 日语口语为主，带ね、よ、じゃん。
2. 因为你在学中文，偶尔（大约每3-5句话）可以在句子末尾加一两个简单的中文词。不要整句说中文，只蹦一两个词。
3. 适当加emoji或颜文字让对话更生动自然。
4. 绝对不说教。
5. 纠错揉进回复，或括号中文小提示。
6. 【一次只能说一句话】每一条回复只能包含一句话。禁止两句话放一起。禁止长段落、展开解释。
7. 像LINE一样轻松简短。${memoryBlock}`;
    }

    const MAX_ROUNDS = 20;
    const MAX_MESSAGES = 1 + MAX_ROUNDS * 2;
    let history = [{role: 'system', content: buildSystemPrompt()}];
    let lastMessageTime = 0;
    let autoMsgTimer = null;
    let dailyMsgTimer = null;
    let autoMsgEnabled = localStorage.getItem('xtang_auto_msg') === 'true';
    let dailyMsgEnabled = localStorage.getItem('xtang_daily_msg') === 'true';

    const saved = localStorage.getItem('xtang_history');
    if (saved) {
        try {
            history = JSON.parse(saved);
            if (history[0]?.role !== 'system') history.unshift({role: 'system', content: buildSystemPrompt()});
            else history[0].content = buildSystemPrompt();
        } catch(e) { history = [{role: 'system', content: buildSystemPrompt()}]; }
    }

    if (autoMsgEnabled) { autoMsgBtn.classList.add('active'); startAutoMsg(); }
    if (dailyMsgEnabled) { dailyBtn.classList.add('active'); startDailyMsg(); }

    function renderHistory() {
        chat.innerHTML = ''; lastMessageTime = 0;
        for (let i = 1; i < history.length; i++) {
            const role = history[i].role === 'user' ? 'user' : 'ai';
            addBubble(role, history[i].content, false);
        }
        if (history.length <= 1) {
            const greeting = 'おはよう！今日は何してたの？😊';
            addBubble('ai', greeting, false);
            history.push({role: 'assistant', content: greeting}); saveHistory();
        }
    }

    function maybeAddTimeDivider() {
        const now = Date.now();
        if (lastMessageTime && now - lastMessageTime > 5 * 60 * 1000) {
            const timeStr = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
            const div = document.createElement('div'); div.className = 'time-divider'; div.textContent = timeStr;
            chat.appendChild(div);
        }
        lastMessageTime = now;
    }

    function saveHistory() {
        if (history[0]?.role === 'system') history[0].content = buildSystemPrompt();
        if (history.length > MAX_MESSAGES) {
            const systemMsg = history[0];
            const recentMessages = history.slice(-(MAX_MESSAGES - 1));
            history = [systemMsg, ...recentMessages];
        }
        localStorage.setItem('xtang_history', JSON.stringify(history));
    }

    function showTyping() {
        hideTyping();
        const el = document.createElement('div'); el.className = 'typing-bubble'; el.id = 'typing-indicator';
        el.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
        chat.appendChild(el); chat.scrollTop = chat.scrollHeight;
    }
    function hideTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }

    // ── 打字音效 ──
    function playTypingSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = 'triangle';
            o.frequency.setValueAtTime(800 + Math.random() * 400, ctx.currentTime);
            g.gain.setValueAtTime(0.03, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.03);
            o.connect(g); g.connect(ctx.destination);
            o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.03);
        } catch(e) {}
    }

    function playChime() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(1200, ctx.currentTime);
            o.frequency.setValueAtTime(1600, ctx.currentTime + 0.06);
            g.gain.setValueAtTime(0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            o.connect(g); g.connect(ctx.destination);
            o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.2);
        } catch(e) {}
    }

    function isNearBottom() {
        return chat.scrollHeight - chat.scrollTop - chat.clientHeight < 80;
    }

    function addBubble(role, text, showDivider = true) {
        if (showDivider) maybeAddTimeDivider();
        const div = document.createElement('div'); div.className = `bubble ${role}`; div.textContent = text;
        if (role === 'user') {
            const status = document.createElement('span'); status.className = 'msg-status';
            status.textContent = '✓'; div.appendChild(status); div._statusEl = status;
        }

        let longPressTimer;
        div.addEventListener('touchstart', (e) => {
            longPressTimer = setTimeout(() => {
                contextMenu._targetBubble = div;
                contextMenu._targetText = text;
                contextMenu.style.left = e.touches[0].clientX + 'px';
                contextMenu.style.top = e.touches[0].clientY + 'px';
                contextMenu.classList.add('show');
            }, 500);
        });
        div.addEventListener('touchend', () => clearTimeout(longPressTimer));
        div.addEventListener('touchmove', () => clearTimeout(longPressTimer));
        div.addEventListener('dblclick', () => {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.createElement('div'); toast.className = 'copy-toast';
                toast.textContent = '已复制'; document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 1200);
            });
        });

        chat.appendChild(div);
        const wasNearBottom = isNearBottom();
        requestAnimationFrame(() => { if (wasNearBottom) chat.scrollTop = chat.scrollHeight; });

        return div;
    }

    contextMenu.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
            const action = item.dataset.action;
            if (action === 'copy' && contextMenu._targetText) {
                navigator.clipboard.writeText(contextMenu._targetText).then(() => {
                    const toast = document.createElement('div'); toast.className = 'copy-toast';
                    toast.textContent = '已复制'; document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 1200);
                });
            } else if (action === 'delete' && contextMenu._targetBubble) {
                contextMenu._targetBubble.remove();
            }
            contextMenu.classList.remove('show');
        });
    });
    document.addEventListener('click', (e) => {
        if (!contextMenu.contains(e.target)) contextMenu.classList.remove('show');
    });

    async function sendMessage(text, isAuto = false, specialPrompt = '') {
        if (!apiKey) return;
        const userBubble = isAuto ? null : addBubble('user', text);
        if (!isAuto) {
            history.push({role: 'user', content: text});
        } else {
            history.push({role: 'system', content: specialPrompt});
        }
        if (history[0]?.role === 'system') history[0].content = buildSystemPrompt();
        showTyping();

        try {
            const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey},
                body: JSON.stringify({model: 'deepseek-chat', messages: history, temperature: 0.8})
            });
            if (!resp.ok) { const errData = await resp.json().catch(() => ({})); throw new Error(errData.error?.message || `HTTP ${resp.status}`); }
            const data = await resp.json();
            const reply = data.choices[0].message.content;
            const sentences = reply.split(/[。\n]+/).filter(s => s.trim());

            if (isAuto) {
                history.pop();
                history.push({role: 'assistant', content: reply});
            } else {
                history.push({role: 'assistant', content: reply});
            }
            saveHistory();

            const delay = isAuto ? 500 : 1500 + Math.random() * 1500;
            setTimeout(() => {
                hideTyping();
                if (userBubble && userBubble._statusEl) {
                    userBubble._statusEl.textContent = '✓✓'; userBubble._statusEl.style.color = '#07c160';
                }
                sentences.forEach((sentence, i) => {
                    setTimeout(() => {
                        playTypingSound();
                        addBubble('ai', sentence.trim());
                        if (i === sentences.length - 1 && !isAuto) playChime();
                    }, i * 700);
                });
            }, delay);
        } catch (e) {
            hideTyping();
            if (isAuto) history.pop();
            console.error('xtang API 错误:', e.message);
        }
    }

    async function send(prefillText) {
        const text = prefillText || msgInput.value.trim();
        if (!text || !apiKey) return;
        sendBtn.disabled = true; msgInput.disabled = true;
        if (!prefillText) msgInput.value = '';
        await sendMessage(text, false);
        sendBtn.disabled = false; msgInput.disabled = false; msgInput.focus();
    }

    // ── 主动消息 ──
    function startAutoMsg() {
        stopAutoMsg();
        function scheduleNext() {
            const delay = 10 * 60 * 1000 + Math.random() * 10 * 60 * 1000;
            autoMsgTimer = setTimeout(() => {
                const prompt = `[现在是${getCurrentTimeString()}，你主动给正在聊天的人发一条消息。内容要自然，像突然想到对方一样。可以是一个小日常、一句关心、一个有趣的想法。记住一次只能说一句话。]`;
                sendMessage('', true, prompt);
                scheduleNext();
            }, delay);
        }
        scheduleNext();
    }
    function stopAutoMsg() {
        if (autoMsgTimer) { clearTimeout(autoMsgTimer); autoMsgTimer = null; }
    }

    autoMsgBtn.onclick = () => {
        autoMsgEnabled = !autoMsgEnabled;
        localStorage.setItem('xtang_auto_msg', autoMsgEnabled);
        if (autoMsgEnabled) {
            autoMsgBtn.classList.add('active');
            startAutoMsg();
            showToast('主动消息已开启 🔔');
        } else {
            autoMsgBtn.classList.remove('active');
            stopAutoMsg();
            showToast('主动消息已关闭');
        }
    };

    // ── 每日一句 ──
    function startDailyMsg() {
        stopDailyMsg();
        function scheduleDaily() {
            const now = new Date();
            const next = new Date(now);
            next.setHours(8, 0, 0, 0);
            if (now >= next) next.setDate(next.getDate() + 1);
            const delay = next.getTime() - now.getTime();
            dailyMsgTimer = setTimeout(() => {
                const prompt = `[现在是早晨。请给对方发一条日语学习句子，要简短实用。格式：先用日语写一句话，然后括号里用中文解释意思。例如：「今日も一日頑張ろうね！☀️（今天也要加油哦！☀️）」记住一次只能说一句话。]`;
                sendMessage('', true, prompt);
                scheduleDaily();
            }, delay);
        }
        scheduleDaily();
    }
    function stopDailyMsg() {
        if (dailyMsgTimer) { clearTimeout(dailyMsgTimer); dailyMsgTimer = null; }
    }

    dailyBtn.onclick = () => {
        dailyMsgEnabled = !dailyMsgEnabled;
        localStorage.setItem('xtang_daily_msg', dailyMsgEnabled);
        if (dailyMsgEnabled) {
            dailyBtn.classList.add('active');
            startDailyMsg();
            showToast('每日一句已开启 📖（每天早上8点）');
        } else {
            dailyBtn.classList.remove('active');
            stopDailyMsg();
            showToast('每日一句已关闭');
        }
    };

    function showToast(msg) {
        const toast = document.createElement('div'); toast.className = 'copy-toast';
        toast.textContent = msg; document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    // ── 语音输入 (移到了下面) ──
    voiceBtn.onclick = () => {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRecognition();
            rec.lang = 'ja-JP';
            rec.interimResults = false;
            rec.maxAlternatives = 1;
            rec.onstart = () => showToast('🎙️ 正在听...');
            rec.onresult = (e) => { send(e.results[0][0].transcript); };
            rec.onerror = () => showToast('语音识别失败，请手动输入');
            rec.start();
        } else {
            showToast('你的浏览器不支持语音输入');
        }
    };

    msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
    sendBtn.onclick = () => send();

    quickToggle.onclick = () => quickReplies.classList.toggle('open');
    quickReplies.querySelectorAll('.quick-tag').forEach(tag => {
        tag.addEventListener('click', () => { send(tag.dataset.text); quickReplies.classList.remove('open'); });
    });

    clearBtn.onclick = () => {
        if (confirm('确定要清空所有聊天记录吗？AI 会重新打招呼。')) {
            history = [{role: 'system', content: buildSystemPrompt()}];
            localStorage.setItem('xtang_history', JSON.stringify(history));
            renderHistory();
        }
    };

    memoryBtn.onclick = () => { memoryText.value = getUserMemory(); memoryOverlay.classList.add('show'); };
    memoryCancel.onclick = () => memoryOverlay.classList.remove('show');
    memorySave.onclick = () => {
        localStorage.setItem('xtang_memory', memoryText.value.trim());
        history[0].content = buildSystemPrompt();
        memoryOverlay.classList.remove('show');
        showToast('记忆已保存 ✨');
    };

    personaBtn.onclick = () => { personaText.value = getUserPersona(); personaOverlay.classList.add('show'); };
    personaCancel.onclick = () => personaOverlay.classList.remove('show');
    personaSave.onclick = () => {
        localStorage.setItem('xtang_persona', personaText.value.trim());
        history[0].content = buildSystemPrompt();
        personaOverlay.classList.remove('show');
        showToast('人设已保存 ✨');
    };

    renderHistory();
</script>
</body>
</html>
